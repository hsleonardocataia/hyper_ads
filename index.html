function selectMedia(type,id,urlOrThumb,titleOrHash) {
  if(mediaMultiSelect){toggleMediaSelect(type,id,urlOrThumb,titleOrHash,urlOrThumb,titleOrHash);return;}
  const target=S.mediaSelectTarget;
  if(target&&typeof target==='object'&&target.type==='adset'){
    const idx=target.index;
    S.adsetCreatives[idx]=type==='video'
      ?{mediaType:'video',videoId:id,videoThumb:urlOrThumb,imageUrl:'',imageHash:''}
      :{mediaType:'image',imageUrl:urlOrThumb,imageHash:titleOrHash,videoId:'',videoThumb:''};
    S.mediaSelectTarget=null;closeMedia();R();return;
  }
  if(target&&typeof target==='object'&&target.type==='ad'){
    const idx=target.index;
    S.adCreatives[idx]=type==='video'
      ?{mediaType:'video',videoId:id,videoThumb:urlOrThumb,imageUrl:'',imageHash:''}
      :{mediaType:'image',imageUrl:urlOrThumb,imageHash:titleOrHash,videoId:'',videoThumb:''};
    S.mediaSelectTarget=null;closeMedia();R();return;
  }
  if(target&&typeof target==='object'&&target.type==='camp_adset'){
    const key=`${target.ci}_${target.si}`;
    S.campAdsetCreatives[key]=type==='video'
      ?{mediaType:'video',videoId:id,videoThumb:urlOrThumb,imageUrl:'',imageHash:''}
      :{mediaType:'image',imageUrl:urlOrThumb,imageHash:titleOrHash,videoId:'',videoThumb:''};
    S.mediaSelectTarget=null;closeMedia();R();return;
  }
  if(target&&typeof target==='object'&&target.type==='camp_adset_ad'){
    const key=`${target.ci}_${target.si}_${target.ai}`;
    S.campAdsetCreatives[key]=type==='video'
      ?{mediaType:'video',videoId:id,videoThumb:urlOrThumb,imageUrl:'',imageHash:''}
      :{mediaType:'image',imageUrl:urlOrThumb,imageHash:titleOrHash,videoId:'',videoThumb:''};
    S.mediaSelectTarget=null;closeMedia();R();return;
  }
  if (target!==null&&typeof target==='number') {
    if(!S.campaignCreatives[target])S.campaignCreatives[target]={mediaType:'image',primaryText:'',headline:'',imageUrl:'',imageHash:'',videoId:'',videoThumb:''};
    const cr=S.campaignCreatives[target];
    if(type==='video'){cr.mediaType='video';cr.videoId=id;cr.videoThumb=urlOrThumb;cr.imageUrl='';cr.imageHash='';}
    else{cr.mediaType='image';cr.imageUrl=urlOrThumb;cr.imageHash=titleOrHash;cr.videoId='';cr.videoThumb='';}
    S.mediaSelectTarget=null;
  } else {
    if(type==='video'){S.da.mediaType='video';S.da.videoId=id;S.da.videoThumb=urlOrThumb;S.da.videoTitle=titleOrHash;S.da.imageUrl='';S.da.imageHash='';}
    else{S.da.mediaType='image';S.da.imageUrl=urlOrThumb;S.da.imageHash=titleOrHash;S.da.videoId='';S.da.videoThumb='';}
  }
  closeMedia();R();
}

async function uploadFile(type,file) {
  if(!file||!S.selectedAccount)return;
  const prog=document.getElementById('upload-prog');
  if(prog){prog.style.display='block';prog.innerHTML=`<div style="background:rgba(215,250,0,.1);border-radius:.5rem;padding:.75rem;font-size:.8rem;color:var(--accent);">Enviando ${file.name}...</div>`;}
  try {
    await new Promise((res,rej)=>{
      const fd=new FormData();fd.append('access_token',S.token);
      if(type==='video'){fd.append('title',file.name.replace(/\.[^/.]+$/,''));fd.append('source',file);}
      else fd.append('filename',file);
      const xhr=new XMLHttpRequest();
      xhr.open('POST',`https://graph.facebook.com/${S.apiVersion}/${S.selectedAccount.id}/${type==='video'?'advideos':'adimages'}`);
      xhr.upload.onprogress=e=>{if(prog&&e.lengthComputable)prog.innerHTML=`<div style="background:rgba(215,250,0,.1);border-radius:.5rem;padding:.75rem;font-size:.8rem;color:var(--accent);">Enviando... ${Math.round(e.loaded/e.total*100)}%</div>`;};
      xhr.onload=()=>{const d=JSON.parse(xhr.responseText);d.error?rej(new Error(d.error.message)):res(d);};
      xhr.onerror=()=>rej(new Error('Upload failed'));
      xhr.send(fd);
    });
    mediaTab=type==='video'?'videos':'images';
    await loadMediaData();
  } catch(e){toast(`Erro no upload: ${e.message}`,'error');}
}

async function uploadMultipleFiles(type,files) {
  if(!files||!files.length||!S.selectedAccount)return;
  const total=files.length;
  let done=0,errors=0;
  const prog=document.getElementById('upload-prog');
  const updateProg=()=>{if(prog){prog.style.display='block';prog.innerHTML=`<div style="background:rgba(215,250,0,.1);border-radius:.5rem;padding:.75rem;font-size:.8rem;color:var(--accent);display:flex;align-items:center;gap:.5rem;"><div style="width:14px;height:14px;border:2px solid #A5B4FC;border-top-color:var(--accent);border-radius:50%;" class="spin"></div><span>${done}/${total} enviados${errors?' · <span style="color:#EF4444">'+errors+' erro(s)</span>':''}</span></div>`;}};
  updateProg();
  for(let i=0;i<total;i++){
    const file=files[i];
    try{
      await new Promise((res,rej)=>{
        const fd=new FormData();fd.append('access_token',S.token);
        if(type==='video'){fd.append('title',file.name.replace(/\.[^/.]+$/,''));fd.append('source',file);}
        else fd.append('filename',file);
        const xhr=new XMLHttpRequest();
        xhr.open('POST',`https://graph.facebook.com/${S.apiVersion}/${S.selectedAccount.id}/${type==='video'?'advideos':'adimages'}`);
        xhr.upload.onprogress=e=>{if(prog&&e.lengthComputable)prog.innerHTML=`<div style="background:rgba(215,250,0,.1);border-radius:.5rem;padding:.75rem;font-size:.8rem;color:var(--accent);display:flex;align-items:center;gap:.5rem;"><div style="width:14px;height:14px;border:2px solid #A5B4FC;border-top-color:var(--accent);border-radius:50%;" class="spin"></div><span>${done+1}/${total}: "${esc(file.name)}" — ${Math.round(e.loaded/e.total*100)}%</span></div>`;};
        xhr.onload=()=>{const d=JSON.parse(xhr.responseText);d.error?rej(new Error(d.error.message)):res(d);};
        xhr.onerror=()=>rej(new Error('Upload failed'));
        xhr.send(fd);
      });
      done++;
    }catch(e){errors++;toast(`Erro em "${file.name}": ${e.message}`,'error');}
    updateProg();
  }
  if(prog)prog.style.display='none';
  toast(`Upload concluído: ${done}/${total} arquivo(s)${errors?' · '+errors+' erro(s)':''}`,errors?'warning':'success');
  mediaTab=type==='video'?'videos':'images';
  await loadMediaData();
}

// ── Validation ────────────────────────────────────────────────────────────
function validateStep(n){
  const errs=[];
  if(n===1){
    if(S.campNames.some(n=>!n.trim()))errs.push('Todos os nomes de campanha devem ser preenchidos.');
    if(new Set(S.campNames.map(n=>n.trim())).size!==S.campNames.length)errs.push('Nomes de campanha devem ser únicos.');
  }
  if(n===2){
    if(!S.cc.cbo&&(!S.ds.budget||parseFloat(S.ds.budget)<1))errs.push('Orçamento mínimo: $1/dia.');
    if(S.cc.objective==='OUTCOME_SALES'&&!S.ds.pixelId)errs.push('Pixel obrigatório para objetivo Vendas.');
    if(!S.ds.countries.trim())errs.push('Informe pelo menos um país.');
    const bs=S.cc.bidStrategy||'LOWEST_COST_WITHOUT_CAP';
    if(bs!=='LOWEST_COST_WITHOUT_CAP'){
      const eff=S.ds.bidAmount||S.cc.bidAmount;
      if(!eff||parseFloat(eff)<=0)errs.push('Informe o valor do lance/custo/ROAS (estratégia '+bs+' requer valor).');
    }
  }
  if(n===3){
    if(S.pageMode==='per_campaign'&&S.nc>1){
      const hasAny=S.campaignPages.some(p=>p)||S.da.pageId;
      if(!hasAny)errs.push('Selecione pelo menos uma página (padrão ou por campanha).');
    }else{
      if(!S.da.pageId)errs.push('Selecione uma Página do Facebook.');
    }
    if(!S.da.linkUrl||!S.da.linkUrl.startsWith('http'))errs.push('URL de destino inválida.');
    if(!S.da.primaryTexts.some(t=>t.trim()))errs.push('Pelo menos um texto principal é obrigatório.');
    if(S.creativeMode==='per_adset'&&!S.adsetCreatives.some(c=>c))errs.push('Selecione pelo menos 1 mídia para os conjuntos.');
  }
  return errs;
}

async function loadCreativeInsights(){
  if(!S.selectedAccount)return;
  S.creativeInsightsLoading=true;R();
  try{
    const adFields='ad_name,ad_id,campaign_name,campaign_id,adset_name,spend,impressions,clicks,ctr,cpc,cpm,reach,actions,action_values,cost_per_action_type,video_thruplay_watched_actions,video_p25_watched_actions,video_p50_watched_actions,video_p75_watched_actions,video_p100_watched_actions,video_play_actions,video_avg_time_watched_actions';
    const adRes=await fbApi(`/${S.selectedAccount.id}/insights`,{fields:adFields,level:'ad',date_preset:S.insightsPeriod,limit:200,access_token:S.token});
    const ads=adRes.data||[];
    if(!ads.length){S.creativeInsights=[];S.creativeInsightsLoading=false;R();return;}

    // Batch get ad creative info to detect video vs image
    const adIds=[...new Set(ads.map(a=>a.ad_id))];
    const creativeReqs=adIds.map(id=>({method:'GET',relative_url:`${id}?fields=creative{thumbnail_url,object_story_spec}`}));
    const crBatch=await batchApi(creativeReqs,S.token);
    const creativeMap={};
    crBatch.forEach((r,i)=>{
      const p=parseBatch(r);
      if(!p.error&&p.creative){
        const spec=p.creative.object_story_spec||{};
        const isVideo=!!spec.video_data;
        creativeMap[adIds[i]]={
          type:isVideo?'video':'image',
          thumb:p.creative.thumbnail_url||spec.video_data?.image_url||spec.link_data?.picture||'',
        };
      }
    });

    // Build enriched creative data
    const getAct=(arr,types)=>{if(!arr)return 0;const ts=Array.isArray(types)?types:[types];for(const t of ts){const a=arr.find(x=>x.action_type===t);if(a)return parseFloat(a.value);}return 0;};
    const getVidAct=(arr,actionType)=>{if(!arr)return 0;const a=arr.find(x=>x.action_type===actionType);return a?parseFloat(a.value):0;};

    S.creativeInsights=ads.map(ad=>{
      const spend=parseFloat(ad.spend||0);
      const impr=parseInt(ad.impressions||0);
      const clicks=parseInt(ad.clicks||0);
      const ctr=parseFloat(ad.ctr||0);
      const cpc=parseFloat(ad.cpc||0);
      const cpm=parseFloat(ad.cpm||0);
      const reach=parseInt(ad.reach||0);
      const purchases=getAct(ad.actions,PURCHASE_TYPES);
      const revenue=getAct(ad.action_values,PURCHASE_TYPES);
      const roas=spend>0?revenue/spend:0;
      const cpa=purchases>0?spend/purchases:0;
      const convRate=clicks>0?(purchases/clicks)*100:0;
      const atc=getAct(ad.actions,['add_to_cart','offsite_conversion.fb_pixel_add_to_cart','omni_add_to_cart']);
      const lpv=getAct(ad.actions,['landing_page_view']);

      // Video metrics
      const thruplay=getVidAct(ad.video_thruplay_watched_actions,'video_view');
      const p25=getVidAct(ad.video_p25_watched_actions,'video_view');
      const p50=getVidAct(ad.video_p50_watched_actions,'video_view');
      const p75=getVidAct(ad.video_p75_watched_actions,'video_view');
      const p100=getVidAct(ad.video_p100_watched_actions,'video_view');
      const plays=getVidAct(ad.video_play_actions,'video_view');
      const avgWatch=getVidAct(ad.video_avg_time_watched_actions,'video_view');

      const hookRate=impr>0?(plays/impr)*100:0;
      const thruplayRate=impr>0?(thruplay/impr)*100:0;
      const costPerThruplay=thruplay>0?spend/thruplay:0;

      // Drop-off analysis: find biggest drop
      const funnel=[{label:'Play',val:plays},{label:'25%',val:p25},{label:'50%',val:p50},{label:'75%',val:p75},{label:'100%',val:p100}];
      let biggestDrop='',biggestDropPct=0;
      for(let i=1;i<funnel.length;i++){
        if(funnel[i-1].val>0){
          const dropPct=((funnel[i-1].val-funnel[i].val)/funnel[i-1].val)*100;
          if(dropPct>biggestDropPct){biggestDropPct=dropPct;biggestDrop=`${funnel[i-1].label}→${funnel[i].label}`;}
        }
      }

      const cr=creativeMap[ad.ad_id]||{type:'image',thumb:''};
      return {
        adId:ad.ad_id, adName:ad.ad_name||'—', campaignName:ad.campaign_name||'—', campaignId:ad.campaign_id,
        adsetName:ad.adset_name||'—',
        type:cr.type, thumb:cr.thumb,
        spend, impressions:impr, clicks, ctr, cpc, cpm, reach,
        purchases, revenue, roas, cpa, convRate, atc, lpv,
        // Video specifics
        hookRate, thruplayRate, thruplay, costPerThruplay, avgWatch,
        p25, p50, p75, p100, plays,
        biggestDrop, biggestDropPct,
        funnel,
      };
    });
  }catch(e){console.error(e);S.creativeInsights=[];toast('Erro ao carregar criativos: '+e.message,'error');}
  S.creativeInsightsLoading=false;R();
}

async function startPub(){
  const errs=[];
  // Validate pages
  if(S.pageMode==='per_campaign'&&S.nc>1){
    const hasAny=S.campaignPages.some(p=>p)||S.da.pageId;
    if(!hasAny)errs.push('Nenhuma página selecionada (nem padrão, nem por campanha).');
    for(let i=0;i<S.nc;i++){if(!S.campaignPages[i]&&!S.da.pageId)errs.push(`Campanha #${i+1}: sem página definida.`);}
  }else{
    if(!S.da.pageId)errs.push('Page ID não selecionado.');
  }
  if(!S.da.linkUrl||!S.da.linkUrl.startsWith('http'))errs.push('URL de destino inválida.');
  if(!S.cc.cbo&&(!S.ds.budget||parseFloat(S.ds.budget)<1))errs.push('Orçamento mínimo: $1/dia.');
  if(errs.length){S.pubErrors=errs.map(e=>({campName:'Validação',error:e}));S.pubFinished=true;S.pubLog=errs.map(e=>({m:`⚠️ ${e}`,t:'error'}));R();return;}

  stopPub=false;S.pubLog=[];S.pubErrors=[];
  const {nc,ns,na}=S,cc=S.cc,ds=S.ds,da=S.da,mode=S.creativeMode||'single';
  const bt=Math.ceil(nc/50)+Math.ceil(nc*ns/50)*2+Math.ceil(nc*ns*na/50);
  S.pubTotal=bt;S.pubDone=0;S.pubRunning=true;S.pubFinished=false;R();
  let bd=0;const bump=n=>{bd+=n;S.pubDone=bd;plog('');};

  // Validate all unique page IDs
  const allPageIds=[...new Set([da.pageId,...(S.campaignPages||[])].filter(Boolean))];
  for(const pid of allPageIds){
    plog(`ℹ️ Validando Page ID: ${pid}...`,'loading');
    try{
      const pc=await fbApi(`/${pid}`,{fields:'id,name',access_token:S.token});
      plog(`  ✓ Página: ${pc.name}`,'success');
    }catch(e){
      plog(`✗ Page ID inválido (${pid}): ${e.message}`,'error');
      S.pubErrors=[{campName:'Validação',error:`Page ${pid}: ${e.message}`}];S.pubRunning=false;S.pubFinished=true;R();return;
    }
  }

  try{
    plog(`━━ FASE 1/4 — ${nc} campanhas`,'loading');
    const cr=S.campNames.map((name,i)=>{
      const b={name:(name||`Campanha ${i+1}`).slice(0,255),objective:cc.objective,status:cc.status,special_ad_categories:cc.specialCat!=='Nenhuma'?[cc.specialCat]:[],...(!cc.cbo?{is_adset_budget_sharing_enabled:'false'}:{})};
      if(cc.cbo&&cc.cboBudget){
        b[cc.cboBudgetType]=Math.round(parseFloat(cc.cboBudget)*100);
        b.bid_strategy=cc.bidStrategy||'LOWEST_COST_WITHOUT_CAP';
        if((b.bid_strategy==='LOWEST_COST_WITH_BID_CAP'||b.bid_strategy==='COST_CAP')&&cc.bidAmount)b.bid_amount=Math.round(parseFloat(cc.bidAmount)*100);
        if(b.bid_strategy==='LOWEST_COST_WITH_MIN_ROAS'&&cc.bidAmount)b.bid_amount=Math.round(parseFloat(cc.bidAmount)*1000);
      }
      return {method:'POST',relative_url:`${S.selectedAccount.id}/campaigns`,body:encodeBody(b)};
    });
    const cb=await batchApi(cr,S.token);bump(Math.ceil(nc/50));
    const cids=cb.map((r,i)=>{const p=parseBatch(r);if(p.error){plog(`  ✗ "${S.campNames[i]}": ${p.error.message}`,'error');S.pubErrors.push({campName:S.campNames[i],error:p.error.message});return null;}plog(`  ✓ "${S.campNames[i]}" → ${p.id}`,'success');return p.id;});
    plog(`  ${cids.filter(Boolean).length}/${nc} campanhas criadas`,'info');
    if(stopPub)throw new Error('stop');

    plog(`━━ FASE 2/4 — ${cids.filter(Boolean).length*ns} conjuntos`,'loading');
    const ar=[],am=[];
    cids.forEach((cid,ci)=>{
      if(!cid)return;
      for(let si=0;si<ns;si++){
        const tg={age_min:Math.max(18,ds.ageMin),age_max:Math.min(65,ds.ageMax),geo_locations:{countries:ds.countries.split(',').map(s=>s.trim()).filter(Boolean)||['US']},...(ds.genders==='female'?{genders:[2]}:ds.genders==='male'?{genders:[1]}:{}),...(ds.detailedTargeting?{flexible_spec:[{interests:ds.detailedTargeting.split(',').map(s=>({name:s.trim()}))}]}:{}),targeting_automation:{advantage_audience:ds.advantageAudience?1:0}};
        const og=OBJ_OPTIM[cc.objective],dt=OBJ_DEST[cc.objective];
        const bidStrategy=cc.bidStrategy||'LOWEST_COST_WITHOUT_CAP';
        const b={name:`${S.adsetPrefix} ${S.campNames[ci]||`C${ci+1}`} — ${String(si+1).padStart(3,'0')}`.slice(0,255),campaign_id:cid,billing_event:OBJ_BILLING[cc.objective],optimization_goal:og,bid_strategy:bidStrategy,status:cc.status,targeting:tg,...(dt!=='UNDEFINED'?{destination_type:dt}:{}),...(og==='OFFSITE_CONVERSIONS'?{attribution_spec:JSON.stringify([{event_type:'CLICK_THROUGH',window_days:7}])}:{})};
        // Bid amount: prefer adset-level (ds.bidAmount), fallback to campaign-level (cc.bidAmount)
        const effBidAmount=ds.bidAmount||cc.bidAmount;
        if((bidStrategy==='LOWEST_COST_WITH_BID_CAP'||bidStrategy==='COST_CAP')&&effBidAmount){
          b.bid_amount=Math.round(parseFloat(effBidAmount)*100);
        }
        if(bidStrategy==='LOWEST_COST_WITH_MIN_ROAS'&&effBidAmount){
          b.bid_amount=Math.round(parseFloat(effBidAmount)*1000);
        }
        if(!cc.cbo&&ds.budget)b[ds.budgetType]=Math.max(100,Math.round(parseFloat(ds.budget)*100));
        if(ds.startTime)b.start_time=ds.startTime+':00';
        if(ds.endTime)b.end_time=ds.endTime+':00';
        if(og==='OFFSITE_CONVERSIONS'&&ds.pixelId)b.promoted_object=JSON.stringify({pixel_id:ds.pixelId,custom_event_type:ds.customEventType||'PURCHASE'});
        ar.push({method:'POST',relative_url:`${S.selectedAccount.id}/adsets`,body:encodeBody(b)});am.push({ci,si});
      }
    });
    const ab=await batchApi(ar,S.token);bump(Math.ceil(ar.length/50));
    const aids=ab.map((r,i)=>{const p=parseBatch(r);if(p.error){plog(`  ✗ Set C${am[i].ci+1}S${am[i].si+1}: ${p.error.message}`,'error');return null;}return p.id;});
    plog(`  ${aids.filter(Boolean).length}/${ar.length} conjuntos criados`,'info');
    if(stopPub)throw new Error('stop');

    plog('━━ FASE 3/4 — criativos','loading');
    const isFbUrl=u=>!u||u.includes('lookaside.facebook')||u.includes('fbcdn.net')||u.includes('scontent');

    const buildLinkData=(cleanUrl,msg,hl,imgHash,imgUrl)=>{
      const ld={link:cleanUrl};
      if(msg)ld.message=msg;if(hl)ld.name=hl;
      ld.call_to_action={type:da.cta,value:{link:cleanUrl}};
      if(imgHash)ld.image_hash=imgHash;
      else if(imgUrl&&!isFbUrl(imgUrl))ld.picture=imgUrl;
      return ld;
    };

    // Pre-fetch video thumbnails for all unique video IDs used
    const allVideoIds=[...new Set([da.videoId,...(S.campaignCreatives||[]).map(c=>c?.videoId),...(S.adsetCreatives||[]).map(c=>c?.videoId),...(S.adCreatives||[]).map(c=>c?.videoId),...Object.values(S.campAdsetCreatives||{}).map(c=>c?.videoId)].filter(Boolean))];
    const videoThumbs={};
    if(allVideoIds.length){
      plog(`  📷 Buscando thumbnails de ${allVideoIds.length} vídeo(s)...`,'loading');
      const thumbReqs=allVideoIds.map(vid=>({method:'GET',relative_url:`${vid}?fields=picture`}));
      const thumbBatch=await batchApi(thumbReqs,S.token);
      thumbBatch.forEach((r,i)=>{const p=parseBatch(r);if(!p.error&&p.picture)videoThumbs[allVideoIds[i]]=p.picture;});
    }

    const perAdMedia=S.adMediaMode==='per_ad'&&na>1;
    const perAdCopy=S.adCopyMode==='per_ad'&&na>1;
    const matrixPerAd=mode==='per_campaign_adset'&&na>1; // matriz com granularidade por anúncio
    const crq=[],crm=[];
    aids.forEach((id,i)=>{
      if(!id)return;
      const {ci,si}=am[i],cleanUrl=da.linkUrl;
      const adCount=perAdMedia||perAdCopy||matrixPerAd?na:1;

      for(let a=0;a<adCount;a++){
        // Resolve matrix cell per ad when applicable
        const matrixCr=mode==='per_campaign_adset'
          ? (matrixPerAd ? S.campAdsetCreatives[`${ci}_${si}_${a}`] : S.campAdsetCreatives[`${ci}_${si}`])
          : null;
        const campCr=mode==='per_campaign'?S.campaignCreatives[ci]:mode==='per_adset'?S.adsetCreatives[si]:matrixCr;
        const effPageId=(S.pageMode==='per_campaign'&&S.campaignPages[ci])||da.pageId;
        // Media: per-ad override > matrix/campaign/adset override > global
        const adCr=perAdMedia?S.adCreatives[a]:null;
        const effHash=adCr?.imageHash||campCr?.imageHash||da.imageHash;
        const effImgUrl=adCr?.imageUrl||campCr?.imageUrl||da.imageUrl;
        const effVideoId=adCr?.videoId||campCr?.videoId||da.videoId;
        const effVideoThumb=adCr?.videoThumb||campCr?.videoThumb||da.videoThumb||videoThumbs[effVideoId]||'';
        // Copy: per-ad override > campaign override > global
        const adCp=perAdCopy?S.adCopies[a]:null;
        const effMsg=(adCp?.primaryText?.trim())||(campCr?.primaryText?.trim())||(da.primaryTexts[0]||'').trim();
        const effHl=(adCp?.headline?.trim())||(campCr?.headline?.trim())||(da.headlines[0]||'').trim();

        let spec;
        if(effVideoId){
          const vd={video_id:effVideoId,call_to_action:{type:da.cta,value:{link:cleanUrl}}};
          if(effMsg)vd.message=effMsg;if(effHl)vd.title=effHl;
          if(effVideoThumb)vd.image_url=effVideoThumb;
          spec={page_id:effPageId,video_data:vd};
        }else{
          spec={page_id:effPageId,link_data:buildLinkData(cleanUrl,effMsg,effHl,effHash,effImgUrl)};
        }

        if(crq.length===0)plog(`  📋 Spec[0]: ${JSON.stringify(spec).slice(0,200)}…`,'info');
        const creativeBody={name:`Creative_C${ci+1}S${si+1}${adCount>1?'A'+(a+1):''}`.slice(0,255),object_story_spec:spec};
        if(da.urlParams&&da.urlParams.trim())creativeBody.url_tags=da.urlParams.trim();
        crq.push({method:'POST',relative_url:`${S.selectedAccount.id}/adcreatives`,body:encodeBody(creativeBody)});
        crm.push({ai:i,ci,si,adIdx:a});
      }
    });

    const crb=await batchApi(crq,S.token);bump(Math.ceil(crq.length/50));
    // Map: crid[adsetIndex] = single creative ID or crid_multi[adsetIndex] = [creative IDs per ad]
    const crid={},crid_multi={};
    crb.forEach((r,idx)=>{
      const p=parseBatch(r);
      const {ai,ci,si,adIdx}=crm[idx];
      if(!p.error){
        if(perAdMedia||perAdCopy||matrixPerAd){
          if(!crid_multi[ai])crid_multi[ai]=[];
          crid_multi[ai][adIdx]=p.id;
        }else{
          crid[ai]=p.id;
        }
      }else{plog(`  ✗ Creative C${ci+1}S${si+1}${(perAdMedia||perAdCopy||matrixPerAd)?'A'+(adIdx+1):''}: ${p.error.message}`,'error');}
    });
    plog(`  ${Object.keys(crid).length+Object.keys(crid_multi).length} adsets com criativos criados`,'info');
    if(stopPub)throw new Error('stop');

    plog('━━ FASE 4/4 — anúncios','loading');
    const aq=[];
    if(perAdMedia||perAdCopy||matrixPerAd){
      // Each ad gets its own creative
      Object.entries(crid_multi).forEach(([ai,crIds])=>{
        const adid=aids[+ai],{ci,si}=am[+ai];
        crIds.forEach((cid_,a)=>{
          if(!cid_)return;
          aq.push({method:'POST',relative_url:`${S.selectedAccount.id}/ads`,body:encodeBody({name:`${da.name||'Ad'} — C${ci+1}S${si+1}A${a+1}`.slice(0,255),adset_id:adid,creative:{creative_id:cid_},status:cc.status})});
        });
      });
    }else{
      // All ads in adset share same creative
      Object.entries(crid).forEach(([ai,cid_])=>{
        const adid=aids[+ai],{ci,si}=am[+ai];
        for(let a=0;a<na;a++)aq.push({method:'POST',relative_url:`${S.selectedAccount.id}/ads`,body:encodeBody({name:`${da.name||'Ad'} — C${ci+1}S${si+1}A${a+1}`.slice(0,255),adset_id:adid,creative:{creative_id:cid_},status:cc.status})});
      });
    }
    const aab=await batchApi(aq,S.token);bump(Math.ceil(aq.length/50));
    const ok=aab.filter(r=>!parseBatch(r).error).length;
    plog(`  ${ok}/${aq.length} anúncios criados`,'info');
    plog(`🎉 Concluído! Campanhas:${cids.filter(Boolean).length} | Conjuntos:${aids.filter(Boolean).length} | Anúncios:${ok}`,'success');
  }catch(e){if(e.message==='stop')plog('⏹ Interrompido','error');else plog(`✗ ${e.message}`,'error');}
  S.pubRunning=false;S.pubFinished=true;R();
}

  S.rules=[r,...S.rules];localStorage.setItem('adRules',JSON.stringify(S.rules));toast('Regra criada!','success');R();

function deleteRule(id){S.rules=S.rules.filter(r=>r.id!=id);localStorage.setItem('adRules',JSON.stringify(S.rules));R();}
async function evaluateRules(){
  if(!S.selectedAccount||!S.rules.length){toast('Selecione uma conta e crie regras primeiro.','warning');return;}
  const activeRules=S.rules.filter(r=>r.active);
  if(!activeRules.length){toast('Nenhuma regra ativa.','warning');return;}
  S.rulesEvaluating=true;S.rulesResults=[];R();
  try{
    const results=[];
    for(const rule of activeRules){
      const preset=rule.period==='1'?'yesterday':rule.period==='3'?'last_3d':rule.period==='7'?'last_7d':'last_14d';
      const fields='campaign_name,campaign_id,spend,impressions,clicks,ctr,cpc,reach,actions,action_values';
      const res=await fbApi(`/${S.selectedAccount.id}/insights`,{fields,level:'campaign',date_preset:preset,limit:500,access_token:S.token});
      const camps=res.data||[];
      for(const c of camps){
        const spend=parseFloat(c.spend||0);
        const clicks=parseInt(c.clicks||0);
        const impressions=parseInt(c.impressions||0);
        const ctr=parseFloat(c.ctr||0);
        const cpc=parseFloat(c.cpc||0);
        const purchases=(c.actions||[]).find(a=>PURCHASE_TYPES.includes(a.action_type));
        const purchaseCount=purchases?parseFloat(purchases.value):0;
        const revenue=(c.action_values||[]).find(a=>PURCHASE_TYPES.includes(a.action_type));
        const revenueVal=revenue?parseFloat(revenue.value):0;
        const roas=spend>0?revenueVal/spend:0;
        const cpa=purchaseCount>0?spend/purchaseCount:Infinity;
        let metricVal;
        switch(rule.metric){
          case 'ROAS': metricVal=roas; break;
          case 'CPA': metricVal=cpa; break;
          case 'CTR': metricVal=ctr; break;
          case 'SPEND': metricVal=spend; break;
          default: metricVal=0;
        }
        const threshold=parseFloat(rule.value);
        const triggered=rule.operator==='less'?metricVal<threshold:metricVal>threshold;
        if(triggered&&spend>0){
          let actionTaken='';
          try{
            if(rule.action==='PAUSE'){
              await fbApi(`/${c.campaign_id}`,{_method:'POST',status:'PAUSED',access_token:S.token});
              actionTaken='Pausada';
            }else if(rule.action==='ENABLE'){
              await fbApi(`/${c.campaign_id}`,{_method:'POST',status:'ACTIVE',access_token:S.token});
              actionTaken='Ativada';
            }else if(rule.action==='INCREASE_BUDGET'){
              const camp=await fbApi(`/${c.campaign_id}`,{fields:'daily_budget,lifetime_budget',access_token:S.token});
              if(camp.daily_budget){
                const newBudget=Math.round(parseInt(camp.daily_budget)*1.2);
                await fbApi(`/${c.campaign_id}`,{_method:'POST',daily_budget:newBudget,access_token:S.token});
                actionTaken=`Budget: $${(parseInt(camp.daily_budget)/100).toFixed(2)} → $${(newBudget/100).toFixed(2)}`;
              }else actionTaken='Sem budget direto (CBO?)';
            }else if(rule.action==='NOTIFY'){
              actionTaken='Notificação';
            }
          }catch(e){actionTaken=`Erro: ${e.message}`;}
          results.push({rule:rule.name,campaign:c.campaign_name,metric:rule.metric,value:metricVal,action:actionTaken});
          rule.triggered=(rule.triggered||0)+1;
        }
      }
    }
    S.rules=[...S.rules];localStorage.setItem('adRules',JSON.stringify(S.rules));
    S.rulesResults=results;
    if(results.length)toast(`${results.length} ação(ões) executada(s)`,'success');
    else toast('Nenhuma campanha acionou as regras.','info');
  }catch(e){toast(`Erro ao avaliar regras: ${e.message}`,'error');}
  S.rulesEvaluating=false;R();
}

async function shopifyApi(path,params={}){
  const gs=JSON.parse(localStorage.getItem('globalSettings')||'{}');
  const cfg=gs.shopify||{};
  if(!cfg.workerUrl||!cfg.shop||!cfg.token)throw new Error('Configure Shopify em Config.');
  const r=await fetch(cfg.workerUrl,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({shop:cfg.shop,token:cfg.token,path,params}),
  });
  if(!r.ok){
    let msg=`Shopify ${r.status}`;
    try{const err=await r.json();if(err.errors)msg+=`: ${typeof err.errors==='string'?err.errors:JSON.stringify(err.errors)}`;}catch{}
    throw new Error(msg);
  }
  return r.json();
}

function shopifyDateMin(period){
  const d=new Date();d.setHours(0,0,0,0);
  const now=new Date();
  if(period==='today')return d.toISOString();
  if(period==='yesterday'){d.setDate(d.getDate()-1);return d.toISOString();}
  const daysMap={last_7d:7,last_14d:14,last_30d:30,last_month:60,lifetime:365,maximum:365};
  const days=daysMap[period]??7;
  d.setDate(d.getDate()-days);
  return d.toISOString();
}

async function loadShopifyData(){
  S.shopify.loading=true;S.shopify.error=null;R();
  try{
    const createdMin=shopifyDateMin(S.insightsPeriod);
    // Paginate orders via since_id
    const orders=[];let sinceId=0;
    while(true){
      const page=await shopifyApi('orders.json',{status:'any',created_at_min:createdMin,limit:250,since_id:sinceId});
      const batch=page.orders||[];
      orders.push(...batch);
      if(batch.length<250)break;
      sinceId=batch[batch.length-1].id;
      if(orders.length>5000){toast('Limite de 5000 pedidos atingido — use período menor','warning');break;}
    }
    const [prodRes,shopRes]=await Promise.all([
      shopifyApi('products.json',{limit:250}),
      shopifyApi('shop.json'),
    ]);
    S.shopify.orders=orders;
    S.shopify.products=prodRes.products||[];
    S.shopify.shop=shopRes.shop||null;
    S.shopify.lastSync=new Date().toISOString();
    toast(`${orders.length} pedidos carregados`,'success',3000);
  }catch(e){
    S.shopify.error=e.message;
    toast('Erro Shopify: '+e.message,'error',5000);
  }finally{
    S.shopify.loading=false;R();
  }
}

function parseUtms(order){
  const out={utm_source:'',utm_medium:'',utm_campaign:'',utm_content:'',utm_term:''};
  (order.note_attributes||[]).forEach(a=>{
    const k=(a.name||'').toLowerCase();
    if(k in out)out[k]=a.value||'';
  });
  try{
    const ls=order.landing_site||'';
    if(ls){
      const u=new URL(ls,'https://x');
      u.searchParams.forEach((v,k)=>{const kl=k.toLowerCase();if(kl in out&&!out[kl])out[kl]=v;});
    }
  }catch{}
  return out;
}

function matchOrdersToCampaigns(orders,campaigns){
  const byName={};
  (campaigns||[]).forEach(c=>{
    const key=(c.campaign_name||'').toLowerCase();
    if(key)byName[key]={campaign:c,orders:[],revenue:0,count:0};
  });
  const unmatched={orders:[],revenue:0,count:0};
  orders.forEach(o=>{
    const {utm_campaign}=parseUtms(o);
    const total=parseFloat(o.total_price||0);
    const key=(utm_campaign||'').toLowerCase().trim();
    let bucket=key?byName[key]:null;
    if(!bucket&&key){
      const hit=Object.keys(byName).find(n=>n&&(n.includes(key)||key.includes(n)));
      if(hit)bucket=byName[hit];
    }
    if(bucket){bucket.orders.push(o);bucket.revenue+=total;bucket.count++;}
    else{unmatched.orders.push(o);unmatched.revenue+=total;unmatched.count++;}
  });
  return {byCampaign:byName,unmatched};
}

if(S.darkMode)document.body.classList.add('dark');
R();
