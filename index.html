/* Toast */
#toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 9999; display: flex; flex-direction: column; gap: .5rem; pointer-events: none; }
.toast { pointer-events: auto; padding: .75rem 1.25rem; border-radius: .75rem; font-size: .8rem; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,.12); animation: toastIn .3s ease-out; max-width: 380px; display: flex; align-items: center; gap: .5rem; }
.toast.info { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
.toast.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
.toast.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
.toast.warning { background: #fffbeb; color: #d97706; border: 1px solid #fde68a; }
.toast-out { animation: toastOut .3s ease-in forwards; }
@keyframes toastIn { from { opacity: 0; transform: translateY(-10px) scale(.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }

/* Dark Mode */
body.dark { --bg-secondary: #0f1729; --bg-card: #1e2d4a; --accent: #d7fa00; --text-primary: #f1f5f9; --text-secondary: #8896ab; --text-muted: #5a6a80; --border: #2a3a56; --border-light: #1e2d4a; }
body.dark { background: var(--bg-secondary); color: var(--text-primary); }
body.dark input, body.dark select, body.dark textarea { background: #1e2d4a !important; color: #f1f5f9 !important; border-color: #2a3a56 !important; }
body.dark option { background: #1e2d4a; color: #f1f5f9; }
body.dark input::placeholder, body.dark textarea::placeholder { color: #5a6a80 !important; }
body.dark .toast.info { background: rgba(26,36,64,.95); color: #d7fa00; border-color: #2a3a56; }
body.dark .toast.success { background: #14532d; border-color: #166534; }
body.dark .toast.error { background: #450a0a; border-color: #7f1d1d; }
body.dark .toast.warning { background: #451a03; border-color: #78350f; }

  .main-content { width: 100% !important; }
  div[style*="grid-template-columns:1fr 1fr 1fr"] { grid-template-columns: 1fr !important; }
  div[style*="grid-template-columns:1fr 1fr"] { grid-template-columns: 1fr !important; }
  div[style*="grid-template-columns:repeat(auto-fill"] { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)) !important; }
  div[style*="grid-template-columns:88px 1fr 1fr"] { grid-template-columns: 1fr !important; }
  table { font-size: .75rem; }
  th, td { padding: .5rem !important; }

<script>
const sleep = ms => new Promise(r => setTimeout(r, ms));

const esc = s => {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
};

const toast = (msg, type='info', duration=3500) => {
  const c = document.getElementById('toast-container'); if (!c) return;
  const icons = { info:'ℹ️', success:'✓', error:'✗', warning:'⚠️' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]||''}</span><span>${esc(msg)}</span>`;
  c.appendChild(el);
  setTimeout(() => { el.classList.add('toast-out'); setTimeout(() => el.remove(), 300); }, duration);
};

const encodeBody = obj => {
  const parts = [];
  Object.entries(obj).forEach(([k, v]) => {
    if (v === undefined || v === null || v === '') return;
    if (Array.isArray(v)) {
      if (!v.length) parts.push(`${encodeURIComponent(k)}=${encodeURIComponent('[]')}`);
      else v.forEach(i => parts.push(`${encodeURIComponent(k)}=${encodeURIComponent(typeof i === 'object' ? JSON.stringify(i) : String(i))}`));
    } else if (typeof v === 'object') {
      parts.push(`${encodeURIComponent(k)}=${encodeURIComponent(JSON.stringify(v))}`);
    } else {
      parts.push(`${encodeURIComponent(k)}=${encodeURIComponent(String(v))}`);
    }
  });
  return parts.join('&');
};

const loadFbSdk = appId => new Promise((res, rej) => {
  const init = () => { window.FB.init({ appId, version: S.apiVersion, cookie: true, xfbml: false }); res(); };
  if (window.FB) { init(); return; }
  window.fbAsyncInit = init;
  if (document.getElementById('fb-sdk')) { setTimeout(() => window.FB ? res() : rej(new Error('FB SDK timeout')), 5000); return; }
  const s = document.createElement('script');
  s.id = 'fb-sdk'; s.src = 'https://connect.facebook.net/en_US/sdk.js';
  s.onerror = () => rej(new Error('Falha ao carregar FB SDK'));
  document.head.appendChild(s);
});

const fbApi = (path, params = {}) => new Promise((res, rej) => {
  if (!window.FB) { rej(new Error('FB SDK não inicializado')); return; }
  const m = params._method || 'GET'; delete params._method;
  window.FB.api(path, m, params, r => {
    if (!r) { rej(new Error('Sem resposta')); return; }
    if (r.error) { rej(new Error(r.error.message)); return; }
    res(r);
  });
});

const batchApi = async (reqs, token, maxRetries=3) => {
  if (!reqs.length) return [];
  const chunks = [];
  for (let i = 0; i < reqs.length; i += 50) chunks.push(reqs.slice(i, i + 50));
  const results = [];
  for (let ci = 0; ci < chunks.length; ci++) {
    let attempt = 0, r;
    while (attempt <= maxRetries) {
      try {
        r = await new Promise((res, rej) => {
          window.FB.api('/', 'POST', { access_token: token, batch: JSON.stringify(chunks[ci]), include_headers: false }, resp => {
            if (!Array.isArray(resp)) rej(new Error(resp?.error?.message || 'Batch error'));
            else res(resp);
          });
        });
        // Check if any item in the batch hit rate limit — if so, retry the whole chunk
        const hasRateLimit = r.some(item => {
          if (!item || item.code < 400) return false;
          try { const b=JSON.parse(item.body); return b.error && (b.error.code===80004||b.error.code===17||b.error.code===4||b.error.code===32); } catch { return false; }
        });
        if (hasRateLimit && attempt < maxRetries) {
          const delay = Math.pow(3, attempt) * 2000;
          if (typeof plog === 'function') plog(`⏳ Rate limit detectado no chunk ${ci+1}/${chunks.length}, aguardando ${delay/1000}s...`, 'loading');
          await sleep(delay);
          attempt++;
          continue;
        }
        break;
      } catch (e) {
        const isRateLimit = /too many|rate limit|80004/i.test(e.message||'') || /\b(17|4)\b/.test(e.message||'');
        if (isRateLimit && attempt < maxRetries) {
          const delay = Math.pow(3, attempt) * 2000;
          if (typeof plog === 'function') plog(`⏳ Rate limit no chunk ${ci+1}, retry em ${delay/1000}s...`, 'loading');
          await sleep(delay);
          attempt++;
        } else throw e;
      }
    }
    results.push(...r);
    // Adaptive delay: more chunks = longer pause to avoid rate limit
    const baseDelay = chunks.length > 5 ? 1500 : chunks.length > 2 ? 800 : 400;
    await sleep(baseDelay);
  }
  return results;
};

const parseBatch = r => {
  if (!r) return { error: { message: 'Sem resposta' } };
  try {
    const b = JSON.parse(r.body);
    if (r.code >= 400) { const e = b.error; return { error: { message: e ? `${e.message} [${e.code}${e.error_subcode?'/'+e.error_subcode:''}]${e.error_user_msg?' → '+e.error_user_msg:''}` : `HTTP ${r.code}` } }; }
    return b;
  } catch { return { error: { message: `Parse error: ${r?.body?.slice(0, 80)}` } }; }
};

const fetchAllPages = async (path, params, maxItems=1000) => {
  let all = [];
  let r = await fbApi(path, params);
  all.push(...(r.data||[]));
  while (r.paging?.next && all.length < maxItems) {
    const url = new URL(r.paging.next);
    const nextParams = Object.fromEntries(url.searchParams.entries());
    r = await fbApi(path, nextParams);
    all.push(...(r.data||[]));
  }
  return all;
};

const R = () => {
  const a = document.getElementById('app'); if (!a) return;
  const ae = document.activeElement;
  const fid = ae?.id || '';
  const fsel = ae?.selectionStart;
  const fselEnd = ae?.selectionEnd;
  const fval = ae?.value;
  const scrollY = a.querySelector('[style*="overflow-y:auto"]')?.scrollTop;
  a.innerHTML = S.view==='login' ? renderLogin() : renderMain();
  if (fid) {
    const el = document.getElementById(fid);
    if (el) {
      if (fval !== undefined && el.value !== fval) el.value = fval;
      el.focus();
      if (fsel !== undefined && el.setSelectionRange) try { el.setSelectionRange(fsel, fselEnd); } catch {}
    }

  if (scrollY !== undefined) { const sc = a.querySelector('[style*="overflow-y:auto"]'); if (sc) sc.scrollTop = scrollY; }
};

      ${personal.length ? `<optgroup label="── Pessoal ──">
        ${personal.map(a=>`<option value="${a.id}" ${S.selectedAccount?.id===a.id?'selected':''}>${acctStatus(a.account_status)} ${esc(a.name)}</option>`).join('')}

      <div style="width:32px;height:32px;background:#d7fa00;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.875rem;font-weight:900;color:#1a2440;flex-shrink:0;">H</div>
      <span style="font-weight:800;font-size:.9rem;letter-spacing:-.01em;">HyperAds</span>

    <nav style="flex:1;padding:.75rem .625rem;overflow-y:auto;">
      ${NAV.map(n=>`<button onclick="setSubview('${n.id}')" style="width:100%;display:flex;align-items:center;gap:.75rem;padding:.625rem .875rem;border-radius:.625rem;border:none;cursor:pointer;font-size:.8rem;margin-bottom:.25rem;background:${S.sub===n.id?'rgba(215,250,0,.1)':'transparent'};color:${S.sub===n.id?'var(--accent)':'var(--text-secondary)'};font-weight:${S.sub===n.id?'700':'500'};transition:all .15s;${S.sub===n.id?'border-left:3px solid var(--accent);':''}" onmouseover="if('${S.sub}'!=='${n.id}')this.style.background='rgba(255,255,255,.04)'" onmouseout="if('${S.sub}'!=='${n.id}')this.style.background='transparent'"><span style="font-size:.95rem;">${n.icon}</span>${n.label}</button>`).join('')}
    </nav>
    ${accountSelect}
    <div style="padding:.75rem;border-top:1px solid var(--border);display:flex;align-items:center;gap:.625rem;">
      ${S.profile?.picture?.data?.url?`<img src="${S.profile.picture.data.url}" style="width:30px;height:30px;border-radius:50%;flex-shrink:0;border:2px solid var(--border);" onerror="this.style.display='none'"/>`:
        `<div style="width:30px;height:30px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;flex-shrink:0;color:var(--bg-primary);">${esc(S.profile?.name?.[0]||'?')}</div>`}
      <span style="font-size:.75rem;color:var(--text-secondary);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(S.profile?.name||'')}</span>
      <button onclick="logout()" style="background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:.8rem;transition:color .2s;" title="Sair" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-muted)'">↩</button>
    </div>

function renderSubview() {
  switch(S.sub) {
    case 'dashboard':  return renderDashboard();
    case 'launch':     return renderLaunch();
    case 'campaigns':  return renderCampaigns();
    case 'media':      return renderMediaView();
    case 'templates':  return renderTemplates();
    case 'rules':      return renderRules();
    case 'settings':   return renderSettings();
    default:           return renderLaunch();
  }
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────
const _ga = (arr, types) => {
  if (!arr) return 0;
  const ts = Array.isArray(types) ? types : [types];
  for (const t of ts) { const a = arr.find(x => x.action_type === t); if (a) return parseFloat(a.value); }
  return 0;
};
const ATC_TYPES = ['add_to_cart','offsite_conversion.fb_pixel_add_to_cart','omni_add_to_cart'];
const PAYMENT_TYPES = ['add_payment_info','offsite_conversion.fb_pixel_add_payment_info'];
const LPV_TYPES = ['landing_page_view'];
const fmt$ = n => `$${parseFloat(n||0).toFixed(2)}`;
const fmtN = n => parseInt(n||0).toLocaleString();
const fmtP = n => `${parseFloat(n||0).toFixed(2)}%`;
const fmtX = n => `${parseFloat(n||0).toFixed(2)}x`;
const fmtSec = n => { const s=parseFloat(n||0); return s<60?`${s.toFixed(1)}s`:`${Math.floor(s/60)}m${Math.round(s%60)}s`; };

function renderDashboard() {
  const ins = S.insights;
  const spend = parseFloat(ins?.spend||0);
  const impr = parseInt(ins?.impressions||0);
  const clicks = parseInt(ins?.clicks||0);
  const purchases = _ga(ins?.actions, PURCHASE_TYPES);
  const revenue = _ga(ins?.action_values, PURCHASE_TYPES);
  const roas = spend>0?revenue/spend:0;
  const cpa = purchases>0?spend/purchases:0;
  const convRate = clicks>0?(purchases/clicks)*100:0;
  const atc = _ga(ins?.actions, ATC_TYPES);
  const paymentInfo = _ga(ins?.actions, PAYMENT_TYPES);
  const lpv = _ga(ins?.actions, LPV_TYPES);
  const cpm = parseFloat(ins?.cpm||0);

  const mcard = (icon,label,value,sub='',color='var(--text-primary)') =>
    `<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:.75rem;padding:.875rem 1rem;box-shadow:0 1px 3px rgba(0,0,0,.05);">
      <div style="display:flex;align-items:center;gap:.375rem;margin-bottom:.375rem;"><span style="font-size:.875rem;">${icon}</span><span style="font-size:.6rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;">${label}</span></div>
      <p style="font-size:1.25rem;font-weight:900;color:${color};margin:0;">${value}</p>
      ${sub?`<p style="font-size:.65rem;color:var(--text-muted);margin:.25rem 0 0;">${sub}</p>`:''}
    </div>`;

  const tabBtn = (id,label,icon) => {
    const lazyLoad=id==='creatives'&&!S.creativeInsights.length?'loadCreativeInsights()':id==='shopify'&&!S.shopify.orders.length?'loadShopifyData()':'R()';
    return `<button onclick="S.dashTab='${id}';${lazyLoad}" style="display:flex;align-items:center;gap:.5rem;padding:.5rem 1rem;border-radius:.5rem;border:1.5px solid ${S.dashTab===id?'#1a2440':'transparent'};background:${S.dashTab===id?'#EEF2FF':'transparent'};color:${S.dashTab===id?'#1a2440':'#64748B'};font-weight:${S.dashTab===id?'700':'500'};font-size:.8rem;cursor:pointer;">${icon} ${label}</button>`;
  };

  return `<div style="display:flex;flex-direction:column;height:100%;overflow:hidden;">
  <div style="padding:1rem 1.5rem;border-bottom:1px solid var(--border);background:var(--bg-card);flex-shrink:0;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;">
      <div><h2 style="font-weight:700;font-size:1.125rem;margin:0;color:var(--text-primary);">Dashboard</h2>
      <p style="font-size:.75rem;color:var(--text-muted);margin:.125rem 0 0;">${esc(S.selectedAccount?.name||'')}</p></div>
      <div style="display:flex;gap:.5rem;align-items:center;">
        <select onchange="S.insightsPeriod=this.value;loadInsights();if(S.dashTab==='creatives')loadCreativeInsights();if(S.shopify.lastSync)loadShopifyData()" style="border:1.5px solid var(--border);border-radius:.5rem;padding:.5rem .75rem;font-size:.8rem;outline:none;background:var(--bg-card);">
          ${PERIODS.map(([v,l])=>`<option value="${v}" ${S.insightsPeriod===v?'selected':''}>${l}</option>`).join('')}
        </select>
        <button onclick="loadInsights();if(S.dashTab==='creatives')loadCreativeInsights();if(S.dashTab==='shopify'||S.shopify.lastSync)loadShopifyData()" style="padding:.5rem 1rem;border:1.5px solid var(--border);border-radius:.625rem;background:var(--bg-card);color:var(--accent);font-size:.8rem;font-weight:600;cursor:pointer;">↻ Atualizar</button>
      </div>
    </div>
    <div style="display:flex;gap:.25rem;">${tabBtn('overview','Visao Geral','📊')}${tabBtn('creatives','Criativos','🎨')}${tabBtn('shopify','Shopify','🛍️')}</div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:1.5rem;">
    ${S.dashTab==='overview'?renderDashOverview(ins,spend,impr,clicks,purchases,revenue,roas,cpa,convRate,atc,paymentInfo,lpv,cpm,mcard):S.dashTab==='shopify'?renderShopifyTab(mcard):renderCreativesTab()}
  </div></div>`;
}

function renderDashOverview(ins,spend,impr,clicks,purchases,revenue,roas,cpa,convRate,atc,paymentInfo,lpv,cpm,mcard){
  if(S.insightsLoading)return `<div style="display:flex;align-items:center;justify-content:center;height:200px;gap:.75rem;color:var(--text-muted);"><div style="width:20px;height:20px;border:2px solid #A5B4FC;border-top-color:var(--accent);border-radius:50%;" class="spin"></div>Carregando...</div>`;
  if(!ins)return `<div style="text-align:center;padding:4rem;color:var(--text-muted);"><div style="font-size:3rem;margin-bottom:.75rem;">📊</div><p style="font-weight:600;color:var(--text-secondary);margin:0 0 1rem;">Clique em Atualizar para carregar</p><button onclick="loadInsights()" style="background:var(--accent);color:white;border:none;border-radius:.625rem;padding:.625rem 1.25rem;font-weight:700;cursor:pointer;">↻ Carregar dados</button></div>`;

  // Funnel metrics
  const funnelRate=(from,to)=>from>0?((to/from)*100).toFixed(1)+'%':'—';

  return `
  <p style="font-size:.7rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.08em;margin:0 0 .5rem;">Performance</p>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:.625rem;margin-bottom:1.25rem;">
    ${mcard('💰','Gasto Total',fmt$(spend))}
    ${mcard('💵','Receita',fmt$(revenue),'','#16A34A')}
    ${mcard('📈','ROAS',fmtX(roas),'',roas>=2?'#16A34A':roas>=1?'#CA8A04':'#DC2626')}
    ${mcard('🎯','CPA',purchases>0?fmt$(cpa):'—')}
    ${mcard('💲','CPC',fmt$(ins.cpc||0))}
    ${mcard('📊','CTR',fmtP(ins.ctr||0))}
    ${mcard('💹','CPM',fmt$(cpm))}
    ${mcard('🛒','Compras',fmtN(purchases))}
    ${S.shopify.orders.length?(()=>{
      const shopRev=S.shopify.orders.reduce((s,o)=>s+parseFloat(o.total_price||0),0);
      const shopOrders=S.shopify.orders.length;
      const realRoas=spend>0?shopRev/spend:0;
      const realCpa=shopOrders>0?spend/shopOrders:0;
      const cur=S.shopify.shop?.currency||'USD';
      const fmtCur=n=>`${cur==='BRL'?'R$':'$'}${parseFloat(n||0).toFixed(2)}`;
      return mcard('🛍️','ROAS Real',fmtX(realRoas),`Shopify: ${fmtCur(shopRev)}`,realRoas>=2?'#16A34A':realRoas>=1?'#CA8A04':'#DC2626')
        +mcard('🎯','CPA Real',fmt$(realCpa),`${shopOrders} pedidos`);
    })():''}
  </div>

  <p style="font-size:.7rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.08em;margin:0 0 .5rem;">Funil de Conversao</p>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:.625rem;margin-bottom:1.25rem;">
    ${mcard('👁','Impressoes',fmtN(impr))}
    ${mcard('🖱','Cliques',fmtN(clicks),`CTR: ${fmtP(ins.ctr||0)}`)}
    ${mcard('📄','Landing Page Views',fmtN(lpv),`Taxa: ${funnelRate(clicks,lpv)}`)}
    ${mcard('🛒','Add to Cart',fmtN(atc),`Taxa: ${funnelRate(lpv||clicks,atc)}`)}
    ${mcard('💳','Payment Info',fmtN(paymentInfo),`Taxa: ${funnelRate(atc,paymentInfo)}`)}
    ${mcard('✅','Compras',fmtN(purchases),`Conv: ${fmtP(convRate)}`,'#16A34A')}
    ${mcard('🌎','Alcance',fmtN(ins.reach||0))}
    ${mcard('📏','Frequencia',impr>0&&ins.reach>0?(impr/parseInt(ins.reach)).toFixed(2)+'x':'—')}
  </div>

  ${S.insightsCampaigns.length?`
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:.75rem;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);">
    <div style="padding:.75rem 1rem;border-bottom:1px solid var(--border);background:var(--border-light);">
      <p style="font-weight:600;font-size:.8rem;color:var(--text-primary);margin:0;">Por Campanha (${S.insightsCampaigns.length})</p>
    </div>
    <div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;min-width:1200px;">
        <thead><tr style="background:var(--bg-secondary);border-bottom:1px solid var(--border);">
          ${['Campanha','Gasto','Receita','ROAS','CPA','Compras','ATC','LPV','Conv%','CPC','CTR','Impressoes'].map(h=>`<th style="padding:.5rem .625rem;text-align:left;font-size:.6rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;">${h}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${S.insightsCampaigns.map(c=>{
            const cs=parseFloat(c.spend||0),cp=_ga(c.actions,PURCHASE_TYPES),cr=_ga(c.action_values,PURCHASE_TYPES);
            const cRoas=cs>0?cr/cs:0,cCpa=cp>0?cs/cp:0;
            const cAtc=_ga(c.actions,ATC_TYPES),cLpv=_ga(c.actions,LPV_TYPES);
            const cClicks=parseInt(c.clicks||0),cConv=cClicks>0?(cp/cClicks*100):0;
            return `<tr style="border-bottom:1px solid var(--border);" onmouseover="this.style.background='#FAFAFA'" onmouseout="this.style.background='white'">
              <td style="padding:.625rem;font-size:.75rem;font-weight:600;color:var(--text-primary);max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(c.campaign_name||'—')}</td>
              <td style="padding:.625rem;font-size:.75rem;color:var(--text-secondary);">${fmt$(cs)}</td>
              <td style="padding:.625rem;font-size:.75rem;color:#16A34A;font-weight:600;">${fmt$(cr)}</td>
              <td style="padding:.625rem;font-size:.75rem;font-weight:700;color:${cRoas>=2?'#16A34A':cRoas>=1?'#CA8A04':'#DC2626'}">${fmtX(cRoas)}</td>
              <td style="padding:.625rem;font-size:.75rem;color:var(--text-secondary);">${cp>0?fmt$(cCpa):'—'}</td>
              <td style="padding:.625rem;font-size:.75rem;color:var(--text-secondary);">${fmtN(cp)}</td>
              <td style="padding:.625rem;font-size:.75rem;color:var(--text-secondary);">${fmtN(cAtc)}</td>
              <td style="padding:.625rem;font-size:.75rem;color:var(--text-secondary);">${fmtN(cLpv)}</td>
              <td style="padding:.625rem;font-size:.75rem;color:var(--text-secondary);">${cConv>0?fmtP(cConv):'—'}</td>
              <td style="padding:.625rem;font-size:.75rem;color:var(--text-secondary);">${fmt$(c.cpc||0)}</td>
              <td style="padding:.625rem;font-size:.75rem;color:var(--text-secondary);">${fmtP(c.ctr||0)}</td>
              <td style="padding:.625rem;font-size:.75rem;color:var(--text-secondary);">${fmtN(c.impressions||0)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`:`<div style="text-align:center;padding:2rem;color:var(--text-muted);font-size:.8rem;">Sem dados por campanha.</div>`}`;
}

function renderCreativesTab(){

function renderShopifyTab(mcard){
  const sh=S.shopify;
  const gs=JSON.parse(localStorage.getItem('globalSettings')||'{}');
  const configured=gs.shopify?.workerUrl&&gs.shopify?.shop&&gs.shopify?.token;

  if(!configured)return `<div style="text-align:center;padding:4rem;color:var(--text-muted);">
    <div style="font-size:3rem;margin-bottom:.75rem;">🛍️</div>
    <p style="font-weight:600;color:var(--text-secondary);margin:0 0 1rem;">Shopify não configurado</p>
    <p style="font-size:.8rem;color:var(--text-muted);margin:0 0 1.5rem;">Configure em Config. → Shopify para conectar sua loja</p>
    <button onclick="setSubview('settings')" style="background:#1a2440;color:white;border:none;border-radius:.625rem;padding:.625rem 1.25rem;font-weight:700;cursor:pointer;">⚙️ Ir para Configurações</button>
  </div>`;

  if(sh.loading)return `<div style="display:flex;align-items:center;justify-content:center;height:200px;gap:.75rem;color:var(--text-muted);"><div style="width:20px;height:20px;border:2px solid var(--border);border-top-color:#1a2440;border-radius:50%;" class="spin"></div>Carregando dados da Shopify...</div>`;

  if(!sh.orders.length)return `<div style="text-align:center;padding:4rem;color:var(--text-muted);">
    <div style="font-size:3rem;margin-bottom:.75rem;">🛍️</div>
    <p style="font-weight:600;color:var(--text-secondary);margin:0 0 1rem;">Carregue os dados da Shopify</p>
    <button onclick="loadShopifyData()" style="background:#d7fa00;color:#1a2440;border:none;border-radius:.625rem;padding:.625rem 1.25rem;font-weight:700;cursor:pointer;">🛍️ Carregar Shopify</button>
  </div>`;

  // Aggregations
  const orders=sh.orders;
  const revenue=orders.reduce((s,o)=>s+parseFloat(o.total_price||0),0);
  const orderCount=orders.length;
  const aov=orderCount>0?revenue/orderCount:0;
  const itemsSold=orders.reduce((s,o)=>s+(o.line_items||[]).reduce((x,li)=>x+(li.quantity||0),0),0);
  const uniqueCust=new Set(orders.map(o=>o.customer?.id||o.email||o.id).filter(Boolean)).size;
  const avgItems=orderCount>0?itemsSold/orderCount:0;
  const currency=sh.shop?.currency||'USD';
  const fmtMoney=n=>`${currency==='BRL'?'R$':'$'}${parseFloat(n||0).toFixed(2)}`;

  // Meta comparison
  const metaSpend=parseFloat(S.insights?.spend||0);
  const realRoas=metaSpend>0?revenue/metaSpend:0;
  const realCpa=orderCount>0?metaSpend/orderCount:0;
  const getAction=(arr,types)=>{if(!arr)return 0;for(const t of types){const a=arr.find(x=>x.action_type===t);if(a)return parseFloat(a.value);}return 0;};
  const metaPurchases=getAction(S.insights?.actions,PURCHASE_TYPES);
  const metaRevenue=getAction(S.insights?.action_values,PURCHASE_TYPES);
  const metaRoas=metaSpend>0?metaRevenue/metaSpend:0;

  // Top products
  const prodAgg={};
  orders.forEach(o=>(o.line_items||[]).forEach(li=>{
    const k=li.product_id||li.title;
    if(!prodAgg[k])prodAgg[k]={title:li.title||'—',qty:0,revenue:0,vendor:li.vendor||''};
    prodAgg[k].qty+=li.quantity||0;
    prodAgg[k].revenue+=parseFloat(li.price||0)*(li.quantity||0);
  }));
  const topProducts=Object.values(prodAgg).sort((a,b)=>b.revenue-a.revenue).slice(0,20);

  // Attribution
  const attribution=matchOrdersToCampaigns(orders,S.insightsCampaigns||[]);
  const matchedRows=Object.values(attribution.byCampaign).filter(b=>b.count>0).sort((a,b)=>b.revenue-a.revenue);

  // Recent orders
  const recentOrders=[...orders].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,50);

  const header=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding:1rem 1.25rem;background:var(--bg-card);border:1px solid var(--border);border-radius:.875rem;">
    <div>
      <p style="font-weight:800;font-size:1rem;color:var(--text-primary);margin:0;">🛍️ ${esc(sh.shop?.name||'Shopify Store')}</p>
      <p style="font-size:.7rem;color:var(--text-muted);margin:.25rem 0 0;">${esc(sh.shop?.domain||'')} · ${currency} · Última sync: ${sh.lastSync?new Date(sh.lastSync).toLocaleString('pt-BR'):'—'}</p>
    </div>
    <button onclick="loadShopifyData()" style="padding:.5rem 1rem;border:1.5px solid var(--border);border-radius:.625rem;background:var(--bg-card);color:#1a2440;font-size:.8rem;font-weight:600;cursor:pointer;">↻ Atualizar Shopify</button>
  </div>`;

  const metrics=`<p style="font-size:.7rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.08em;margin:0 0 .5rem;">Vendas Shopify</p>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:.625rem;margin-bottom:1.25rem;">
    ${mcard('💵','Receita Total',fmtMoney(revenue),'','#16A34A')}
    ${mcard('📦','Pedidos',fmtN(orderCount))}
    ${mcard('🎫','Ticket Médio',fmtMoney(aov))}
    ${mcard('📊','Itens Vendidos',fmtN(itemsSold))}
    ${mcard('👥','Clientes',fmtN(uniqueCust))}
    ${mcard('📈','Itens/Pedido',avgItems.toFixed(2))}

  const realRoasCard=`<div style="background:linear-gradient(135deg,#1a2440 0%,#0f1729 100%);border-radius:.875rem;padding:1.5rem;margin-bottom:1.25rem;color:white;box-shadow:0 4px 16px rgba(26,36,64,.2);">

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1.25rem;">
      <div>
        <p style="font-size:.65rem;color:#8896ab;margin:0 0 .25rem;text-transform:uppercase;font-weight:700;">Gasto Meta</p>

        <p style="font-size:1.5rem;font-weight:900;margin:0;color:${realRoas>=2?'#22c55e':realRoas>=1?'#fbbf24':'#ef4444'};">${fmtX(realRoas)}</p>

      <div>

      </div>
    </div>
    <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,.1);display:flex;gap:1rem;flex-wrap:wrap;font-size:.7rem;color:#8896ab;">
      <span>Meta reportou: <strong style="color:white;">${fmtN(metaPurchases)} compras</strong> · ${fmt$(metaRevenue)} · ROAS ${fmtX(metaRoas)}</span>
      <span>Shopify real: <strong style="color:#d7fa00;">${fmtN(orderCount)} pedidos</strong> · ${fmtMoney(revenue)} · ROAS ${fmtX(realRoas)}</span>
    </div>
  </div>`;

  const productsTable=`<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:.875rem;overflow:hidden;margin-bottom:1.25rem;">
    <div style="padding:.875rem 1.25rem;border-bottom:1px solid var(--border);background:var(--border-light);">
      <p style="font-weight:700;font-size:.875rem;color:var(--text-primary);margin:0;">🏆 Top Produtos (${topProducts.length})</p>
    </div>
    <div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;min-width:700px;">
        <thead><tr style="background:var(--bg-secondary);border-bottom:1px solid var(--border);">
          ${['Produto','Qtd','Receita','Preço Médio','% Total'].map(h=>`<th style="padding:.625rem .875rem;text-align:left;font-size:.65rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;">${h}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${topProducts.map(p=>{
            const pct=revenue>0?(p.revenue/revenue*100):0;
            const avgPrice=p.qty>0?p.revenue/p.qty:0;
            return `<tr style="border-bottom:1px solid var(--border-light);">
              <td style="padding:.75rem .875rem;font-size:.8rem;font-weight:600;color:var(--text-primary);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.title)}</td>
              <td style="padding:.75rem .875rem;font-size:.8rem;color:var(--text-secondary);">${fmtN(p.qty)}</td>
              <td style="padding:.75rem .875rem;font-size:.8rem;color:#16A34A;font-weight:700;">${fmtMoney(p.revenue)}</td>
              <td style="padding:.75rem .875rem;font-size:.8rem;color:var(--text-secondary);">${fmtMoney(avgPrice)}</td>
              <td style="padding:.75rem .875rem;font-size:.8rem;color:var(--text-secondary);">${pct.toFixed(1)}%</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;

  const attrTable=`<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:.875rem;overflow:hidden;margin-bottom:1.25rem;">
    <div style="padding:.875rem 1.25rem;border-bottom:1px solid var(--border);background:var(--border-light);">
      <p style="font-weight:700;font-size:.875rem;color:var(--text-primary);margin:0;">🎯 Atribuição por Campanha (${matchedRows.length} match · ${attribution.unmatched.count} sem UTM)</p>
      <p style="font-size:.65rem;color:var(--text-muted);margin:.2rem 0 0;">Cruza utm_campaign dos pedidos Shopify com nomes das campanhas Meta</p>
    </div>
    <div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;min-width:900px;">
        <thead><tr style="background:var(--bg-secondary);border-bottom:1px solid var(--border);">
          ${['Campanha','Gasto Meta','Receita Shopify','Pedidos','ROAS Real','CPA Real','ROAS Meta','Delta'].map(h=>`<th style="padding:.625rem .875rem;text-align:left;font-size:.65rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;">${h}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${matchedRows.map(row=>{
            const c=row.campaign;
            const spend=parseFloat(c.spend||0);
            const rRoas=spend>0?row.revenue/spend:0;
            const rCpa=row.count>0?spend/row.count:0;
            const mRev=getAction(c.action_values,PURCHASE_TYPES);
            const mRoas=spend>0?mRev/spend:0;
            const delta=mRoas>0?((rRoas-mRoas)/mRoas*100):0;
            return `<tr style="border-bottom:1px solid var(--border-light);">
              <td style="padding:.75rem .875rem;font-size:.8rem;font-weight:600;color:var(--text-primary);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(c.campaign_name)}</td>
              <td style="padding:.75rem .875rem;font-size:.8rem;color:var(--text-secondary);">${fmt$(spend)}</td>
              <td style="padding:.75rem .875rem;font-size:.8rem;color:#16A34A;font-weight:700;">${fmtMoney(row.revenue)}</td>
              <td style="padding:.75rem .875rem;font-size:.8rem;color:var(--text-secondary);">${fmtN(row.count)}</td>
              <td style="padding:.75rem .875rem;font-size:.8rem;font-weight:700;color:${rRoas>=2?'#16A34A':rRoas>=1?'#CA8A04':'#DC2626'};">${fmtX(rRoas)}</td>
              <td style="padding:.75rem .875rem;font-size:.8rem;color:var(--text-secondary);">${row.count>0?fmt$(rCpa):'—'}</td>
              <td style="padding:.75rem .875rem;font-size:.8rem;color:var(--text-muted);">${fmtX(mRoas)}</td>
              <td style="padding:.75rem .875rem;font-size:.8rem;font-weight:700;color:${delta>=0?'#16A34A':'#DC2626'};">${delta>=0?'+':''}${delta.toFixed(0)}%</td>
            </tr>`;
          }).join('')}
          ${attribution.unmatched.count>0?`<tr style="border-top:2px solid var(--border);background:var(--bg-secondary);">
            <td style="padding:.75rem .875rem;font-size:.75rem;font-style:italic;color:var(--text-muted);">⚠️ Sem atribuição (UTM ausente)</td>
            <td style="padding:.75rem .875rem;font-size:.75rem;color:var(--text-muted);">—</td>
            <td style="padding:.75rem .875rem;font-size:.75rem;color:#16A34A;font-weight:700;">${fmtMoney(attribution.unmatched.revenue)}</td>
            <td style="padding:.75rem .875rem;font-size:.75rem;color:var(--text-muted);">${fmtN(attribution.unmatched.count)}</td>
            <td colspan="4" style="padding:.75rem .875rem;font-size:.7rem;color:var(--text-muted);">Configure UTMs nas campanhas para atribuir estes pedidos</td>
          </tr>`:''}
        </tbody>
      </table>
    </div>
  </div>`;

  const ordersTable=`<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:.875rem;overflow:hidden;">
    <div style="padding:.875rem 1.25rem;border-bottom:1px solid var(--border);background:var(--border-light);">
      <p style="font-weight:700;font-size:.875rem;color:var(--text-primary);margin:0;">📋 Pedidos Recentes (${Math.min(50,orders.length)} de ${orders.length})</p>
    </div>
    <div style="overflow-x:auto;max-height:500px;overflow-y:auto;">
      <table style="width:100%;border-collapse:collapse;min-width:900px;">
        <thead><tr style="background:var(--bg-secondary);border-bottom:1px solid var(--border);position:sticky;top:0;">
          ${['Data','Pedido','Valor','Produtos','Fonte','UTM Campaign','Status'].map(h=>`<th style="padding:.625rem .875rem;text-align:left;font-size:.65rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;">${h}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${recentOrders.map(o=>{
            const utms=parseUtms(o);
            const prodNames=(o.line_items||[]).map(li=>li.title).join(', ');
            const status=o.financial_status||'—';
            const statusColor=status==='paid'?'#16A34A':status==='pending'?'#CA8A04':status==='refunded'?'#DC2626':'var(--text-muted)';
            return `<tr style="border-bottom:1px solid var(--border-light);">
              <td style="padding:.625rem .875rem;font-size:.75rem;color:var(--text-muted);white-space:nowrap;">${new Date(o.created_at).toLocaleDateString('pt-BR')}</td>
              <td style="padding:.625rem .875rem;font-size:.75rem;font-weight:600;color:var(--text-primary);">${esc(o.name||'#'+o.order_number)}</td>
              <td style="padding:.625rem .875rem;font-size:.75rem;color:#16A34A;font-weight:700;">${fmtMoney(o.total_price)}</td>
              <td style="padding:.625rem .875rem;font-size:.7rem;color:var(--text-secondary);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(prodNames)}</td>
              <td style="padding:.625rem .875rem;font-size:.7rem;color:var(--text-muted);">${esc(o.source_name||'—')}</td>
              <td style="padding:.625rem .875rem;font-size:.7rem;color:var(--text-secondary);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(utms.utm_campaign||'—')}</td>
              <td style="padding:.625rem .875rem;font-size:.7rem;font-weight:700;color:${statusColor};text-transform:uppercase;">${esc(status)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;

  return header+metrics+realRoasCard+productsTable+attrTable+ordersTable;
}

  const total=(S.nc*S.ns*S.na).toLocaleString();
  return `<div style="display:flex;flex-direction:column;height:100%;overflow:hidden;">
  <div style="padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);background:var(--bg-primary);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">

    <p style="font-size:.75rem;color:var(--text-muted);margin:.125rem 0 0;">Batch API · ${total} anúncios</p></div>
    <div style="display:flex;gap:.25rem;background:var(--border-light);border-radius:.75rem;padding:.25rem;">
      ${BULK_STEPS.map((s,i)=>`<button onclick="${i<S.bulkStep?`setBulkStep(${i})`:''}" style="display:flex;align-items:center;gap:.375rem;padding:.375rem .625rem;border-radius:.5rem;border:none;font-size:.75rem;font-weight:600;cursor:${i<S.bulkStep?'pointer':'default'};background:${i===S.bulkStep?'white':'transparent'};color:${i===S.bulkStep?'#1a2440':i<S.bulkStep?'#16A34A':'#94A3B8'};box-shadow:${i===S.bulkStep?'0 1px 3px rgba(0,0,0,.1)':'none'};">${i<S.bulkStep?'✓':`<span style="width:16px;height:16px;border-radius:50%;background:${i===S.bulkStep?'#1a2440':'var(--border)'};color:${i===S.bulkStep?'white':'#94A3B8'};display:inline-flex;align-items:center;justify-content:center;font-size:.625rem;">${i+1}</span>`}${s}</button>`).join('')}
    </div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:1.5rem;"><div style="max-width:800px;margin:0 auto;">${steps[S.bulkStep]}</div></div>
  <div style="padding:1rem 1.5rem;border-top:1px solid var(--border);background:var(--bg-card);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
    <button onclick="setBulkStep(${Math.max(0,S.bulkStep-1)})" ${S.bulkStep===0?'disabled':''} style="padding:.625rem 1.25rem;border:1.5px solid var(--border);border-radius:.75rem;background:var(--bg-card);color:var(--text-secondary);font-weight:600;font-size:.875rem;cursor:${S.bulkStep===0?'default':'pointer'};opacity:${S.bulkStep===0?'.4':'1'};">← Anterior</button>
    <span style="font-size:.75rem;color:var(--text-muted);">${S.bulkStep+1} / ${BULK_STEPS.length}</span>
    ${S.bulkStep<BULK_STEPS.length-1?`<button onclick="nextStep()" style="padding:.625rem 1.5rem;border:none;border-radius:.75rem;background:var(--accent);color:white;font-weight:700;font-size:.875rem;cursor:pointer;" onmouseover="this.style.background='#0f1729'" onmouseout="this.style.background='#1a2440'">Próximo →</button>`:''}
  </div></div>`;
}

function renderS0() {
  return card('Estrutura da Publicação','Campanhas, conjuntos e anúncios que serão criados',`
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;">
    ${[['nc','Campanhas',50],['ns','Conj./Camp.',500],['na','Anúnc./Conj.',30]].map(([f,l,mx])=>`
    <div style="text-align:center;background:var(--bg-secondary);border-radius:.75rem;padding:1.25rem;border:1.5px solid var(--border);">

      <input type="number" min="1" max="${mx}" value="${S[f]}"
        oninput="S['${f}']=Math.max(1,Math.min(${mx},+this.value));if('${f}'==='nc'){S.campNames=Array.from({length:S.nc},(_,i)=>S.campNames[i]||('Campanha '+(i+1).toString().padStart(2,'0')));S.campaignCreatives=Array.from({length:S.nc},(_,i)=>S.campaignCreatives[i]!==undefined?S.campaignCreatives[i]:null);S.campaignPages=Array.from({length:S.nc},(_,i)=>S.campaignPages[i]||null)}if('${f}'==='ns'){S.adsetCreatives=Array.from({length:S.ns},(_,i)=>S.adsetCreatives[i]||null)}if('${f}'==='na'){S.adCreatives=Array.from({length:S.na},(_,i)=>S.adCreatives[i]||null);S.adCopies=Array.from({length:S.na},(_,i)=>S.adCopies[i]||null)}"
        style="width:100%;text-align:center;font-size:2rem;font-weight:900;color:var(--text-primary);border:2px solid var(--border-light);border-radius:.75rem;padding:.5rem;outline:none;background:var(--bg-card);"
        onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border-light)'"/>
      <p style="font-size:.7rem;color:var(--text-muted);margin:.5rem 0 0;">máx. ${mx}</p>
    </div>`).join('')}
  </div>
  <div style="background:var(--bg-secondary);border-radius:.75rem;padding:1.25rem;border:1px solid var(--border);">
    <p style="font-size:.7rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;margin:0 0 .75rem;">Resumo</p>
    <div style="display:flex;flex-direction:column;gap:.5rem;">
      ${[['🎯 Campanhas',S.nc],['📦 Total Conjuntos',(S.nc*S.ns).toLocaleString()],['📣 Total Anúncios',(S.nc*S.ns*S.na).toLocaleString()],['🔁 Lotes HTTP (Batch)',Math.ceil(S.nc/50)+Math.ceil(S.nc*S.ns/50)*2+Math.ceil(S.nc*S.ns*S.na/50)]].map(([l,v])=>`

      </div>`).join('')}
    </div>
  </div>`);
}

        ${OBJECTIVES.map(o=>`

    <div style="display:flex;flex-direction:column;gap:.875rem;">

      ${sel('Estratégia de lance','cc-bidstrategy',[['LOWEST_COST_WITHOUT_CAP','Maior volume (padrão)'],['LOWEST_COST_WITH_BID_CAP','Limite de lance (Bid Cap)'],['COST_CAP','Limite de custo (Cost Cap)'],['LOWEST_COST_WITH_MIN_ROAS','ROAS mínimo']],cc.bidStrategy,"S.cc.bidStrategy=this.value;R()")}
      ${cc.bidStrategy==='LOWEST_COST_WITH_BID_CAP'||cc.bidStrategy==='COST_CAP'?`<div style="padding-left:.5rem;">${inp(cc.bidStrategy==='COST_CAP'?'Custo máximo por resultado ($)':'Lance máximo por resultado ($)','cc-bidamount','number','5.00',cc.bidAmount,"S.cc.bidAmount=this.value")}<p style="font-size:.65rem;color:var(--text-muted);margin:.25rem 0 0;">${cc.bidStrategy==='LOWEST_COST_WITH_BID_CAP'?'Meta não vai dar lances acima deste valor por leilão':'Meta vai manter o custo médio por resultado em torno deste valor'}</p></div>`:''}

    </div>

}

function renderS2() {
  const ds=S.ds, cc=S.cc;
  const useCbo=cc.cbo;
  const bidStrat=cc.bidStrategy||'LOWEST_COST_WITHOUT_CAP';
  const hasBidCap=bidStrat==='LOWEST_COST_WITH_BID_CAP'||bidStrat==='COST_CAP';
  const hasMinRoas=bidStrat==='LOWEST_COST_WITH_MIN_ROAS';
  const pixelField=`<div>
    <label style="display:block;font-size:.7rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.375rem;">Pixel</label>
    ${S.pixels.length?`
    <select onchange="S.ds.pixelId=this.value" style="width:100%;border:1.5px solid var(--border);border-radius:.5rem;padding:.625rem .75rem;font-size:.875rem;outline:none;background:var(--bg-card);">
      <option value="">Selecionar pixel...</option>
      ${S.pixels.map(p=>`<option value="${esc(p.id)}" ${ds.pixelId===p.id?'selected':''}>${esc(p.name)} (${esc(p.id)})</option>`).join('')}

    <p style="font-size:.65rem;color:var(--text-muted);margin:.25rem 0 0;">${S.pixels.length} pixel(s) encontrado(s)</p>`:`

      <input type="text" placeholder="${S.pixelsLoading?'Carregando...':'Cole o Pixel ID'}" value="${esc(ds.pixelId)}" oninput="S.ds.pixelId=this.value"

      <button onclick="loadPixels(true)" style="padding:.625rem .875rem;border:1.5px solid var(--border);border-radius:.5rem;background:var(--bg-card);color:var(--accent);font-size:.8rem;font-weight:600;cursor:pointer;">↻</button>
    </div>`}
  </div>`;

  return `
  ${card('Prefixo dos Conjuntos','',`
  <div style="display:flex;gap:.75rem;align-items:center;">
    <input id="adset-prefix" value="${esc(S.adsetPrefix)}" oninput="S.adsetPrefix=this.value"
      style="flex:1;border:1.5px solid var(--border);border-radius:.5rem;padding:.625rem .75rem;font-size:.875rem;outline:none;"
      onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'"/>

                    return `<div style="border:1.5px solid ${has?'var(--border-light)':'var(--border)'};border-radius:.5rem;overflow:hidden;background:var(--bg-card);">
                      <div onclick="openMediaForCampAdsetAd(${ci},${si},${ai})" style="height:56px;background:var(--bg-primary);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;">
                        ${has&&cr.videoThumb?`<img src="${cr.videoThumb}" style="width:100%;height:100%;object-fit:cover;"/>`:has&&cr.imageUrl?`<img src="${cr.imageUrl}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'"/>`:has?'<span style="font-size:1.1rem;">🎬</span>':'<span style="font-size:1.1rem;color:var(--text-muted);">+</span>'}
                        ${has?`<span style="position:absolute;top:2px;left:2px;background:${cr.videoId?'var(--accent)':'#F59E0B'};color:white;font-size:.4rem;padding:1px 3px;border-radius:99px;font-weight:700;">${cr.videoId?'VID':'IMG'}</span>`:''}
                        ${has?`<button onclick="event.stopPropagation();delete S.campAdsetCreatives['${k}'];R()" style="position:absolute;top:2px;right:2px;width:14px;height:14px;background:rgba(239,68,68,.9);border:none;border-radius:50%;color:white;font-size:.5rem;cursor:pointer;line-height:12px;padding:0;">×</button>`:''}
                      </div>
                      <p style="font-size:.55rem;font-weight:700;color:${has?'#1a2440':'var(--text-muted)'};margin:0;text-align:center;padding:.2rem;">Ad ${ai+1}</p>
                    </div>`;
                  }).join('')}
                </div>
              </div>`;
            }).join('')}
          </div>`:''}
        </div>`;
      }).join('')}
    </div>`);

    // Copy card (reutiliza estrutura global)
    const copyCardMatrix=card('Copy (compartilhada)','Mesma copy para todos',`
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.375rem;">
        <label style="font-size:.7rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;">Texto Principal</label>
        <button onclick="S.da.primaryTexts=[...S.da.primaryTexts,''];R()" style="font-size:.75rem;color:var(--accent);background:transparent;border:none;cursor:pointer;font-weight:600;">+ Variação</button>
      </div>
      ${da.primaryTexts.map((t,i)=>`
      <div style="display:flex;gap:.5rem;margin-bottom:.5rem;">
        <textarea id="pt-${i}" oninput="S.da.primaryTexts[${i}]=this.value"
          style="flex:1;border:1.5px solid var(--border);border-radius:.5rem;padding:.625rem .75rem;font-size:.875rem;outline:none;resize:none;min-height:60px;"
          onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'" placeholder="Texto principal...">${esc(t)}</textarea>
        ${da.primaryTexts.length>1?`<button onclick="S.da.primaryTexts=S.da.primaryTexts.filter((_,j)=>j!==${i});R()" style="color:#EF4444;background:transparent;border:none;cursor:pointer;font-size:1.25rem;align-self:start;">×</button>`:''}
      </div>`).join('')}
    </div>
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.375rem;">
        <label style="font-size:.7rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;">Headline</label>
        <button onclick="S.da.headlines=[...S.da.headlines,''];R()" style="font-size:.75rem;color:var(--accent);background:transparent;border:none;cursor:pointer;font-weight:600;">+ Variação</button>
      </div>
      ${da.headlines.map((t,i)=>`
      <div style="display:flex;gap:.5rem;margin-bottom:.5rem;">
        <input id="hl-${i}" value="${esc(t)}" oninput="S.da.headlines[${i}]=this.value"
          style="flex:1;border:1.5px solid var(--border);border-radius:.5rem;padding:.625rem .75rem;font-size:.875rem;outline:none;"
          onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'" placeholder="Headline"/>
        ${da.headlines.length>1?`<button onclick="S.da.headlines=S.da.headlines.filter((_,j)=>j!==${i});R()" style="color:#EF4444;background:transparent;border:none;cursor:pointer;font-size:1.25rem;align-self:center;">×</button>`:''}
      </div>`).join('')}
    </div>`);

    return modeCard+pageModeCard+globalCard+matrixCard+copyCardMatrix+adLevelCard;
  }

  // ── Modo PER_CAMPAIGN: grid de campanhas ──────────────────────────────
  const hasGlobalMedia=da.imageHash||da.imageUrl||da.videoId;
  const perCampCard=card('Criativos por Campanha',`${S.nc} campanhas · vazio = usa criativo padrão`,`
  ${!hasGlobalMedia?`<div style="background:#FEF9C3;border:1px solid #FDE68A;border-radius:.625rem;padding:.75rem;font-size:.75rem;color:#92400E;display:flex;gap:.5rem;">
    <span>⚠️</span><span>Nenhum criativo padrão configurado. Recomendado: configure um no modo <strong>Único</strong> como fallback para campanhas sem mídia específica.</span>
  </div>`:''}
  ${S.campNames.map((name,i)=>{
    const cr=S.campaignCreatives[i]||{};
    const hasImg=cr.imageHash||cr.imageUrl, hasVid=cr.videoId, hasMed=hasImg||hasVid;
    const statusTag=hasMed?
      `<span style="font-size:.65rem;background:#DCFCE7;color:#16A34A;padding:.125rem .5rem;border-radius:99px;font-weight:700;flex-shrink:0;">✓ Mídia ok</span>`:
      (hasGlobalMedia?`<span style="font-size:.65rem;background:var(--bg-primary);color:var(--text-secondary);padding:.125rem .5rem;border-radius:99px;font-weight:700;flex-shrink:0;">↳ usa padrão</span>`:
      `<span style="font-size:.65rem;background:#FEF9C3;color:#CA8A04;padding:.125rem .5rem;border-radius:99px;font-weight:700;flex-shrink:0;">⚠ sem mídia</span>`);
    return `<div style="border:1.5px solid ${hasMed?'var(--border-light)':'var(--border)'};border-radius:.75rem;padding:1rem;">
      <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem;">
        <span style="font-size:.7rem;font-weight:700;background:rgba(215,250,0,.1);color:var(--accent);padding:.25rem .5rem;border-radius:99px;flex-shrink:0;">Camp. ${i+1}</span>
        <span style="font-size:.8rem;font-weight:600;color:var(--text-primary);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(name)}</span>
        ${statusTag}
      </div>
      <div style="display:grid;grid-template-columns:88px 1fr 1fr;gap:.75rem;align-items:start;">
        <div>
          <label style="display:block;font-size:.65rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.375rem;">Mídia</label>
          ${hasMed?`<div style="position:relative;">
            ${cr.imageUrl?`<img src="${cr.imageUrl}" onclick="openMediaForCampaign(${i})" style="width:88px;height:66px;object-fit:cover;border-radius:.5rem;border:2px solid #22C55E;display:block;cursor:pointer;"/>`:
              `<div onclick="openMediaForCampaign(${i})" style="width:88px;height:66px;background:var(--bg-card);border-radius:.5rem;border:2px solid #22C55E;display:flex;align-items:center;justify-content:center;font-size:1.75rem;cursor:pointer;">🎬</div>`}
            <button onclick="setCampCreative(${i},'imageHash','');setCampCreative(${i},'imageUrl','');setCampCreative(${i},'videoId','');R()" style="position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:#EF4444;border:none;border-radius:50%;color:white;font-size:.625rem;cursor:pointer;line-height:18px;text-align:center;">×</button>
          </div>`:`
          <button onclick="openMediaForCampaign(${i})" style="width:88px;height:66px;border:1.5px dashed var(--border);border-radius:.5rem;background:var(--bg-card);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.25rem;cursor:pointer;" onmouseover="this.style.borderColor='#1a2440';this.style.background='#F8FAFC'" onmouseout="this.style.borderColor='var(--border)';this.style.background='white'">
            <span style="font-size:1.25rem;">📁</span>
            <span style="font-size:.6rem;color:var(--text-muted);font-weight:600;text-align:center;">Selecionar</span>
          </button>`}
        </div>
        <div>
          <label style="display:block;font-size:.65rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.375rem;">Texto Principal</label>
          <textarea id="cpc-pt-${i}" oninput="setCampCreative(${i},'primaryText',this.value)" placeholder="Vazio = usa o padrão..."
            style="width:100%;border:1.5px solid var(--border);border-radius:.5rem;padding:.5rem .625rem;font-size:.8rem;outline:none;resize:none;height:66px;"
            onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">${esc(cr.primaryText||'')}</textarea>
        </div>
        <div>
          <label style="display:block;font-size:.65rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.375rem;">Headline</label>
          <input id="cpc-hl-${i}" value="${esc(cr.headline||'')}" oninput="setCampCreative(${i},'headline',this.value)" placeholder="Vazio = usa o padrão..."
            style="width:100%;border:1.5px solid var(--border);border-radius:.5rem;padding:.5rem .625rem;font-size:.8rem;outline:none;height:36px;"
            onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'"/>
        </div>
      </div>
    </div>`;
  }).join('')}`);

  return modeCard+pageModeCard+globalCard+perCampCard+adLevelCard;
}

function renderS4() {
  const da=S.da, mode=S.creativeMode||'single';
  const customCount=S.campaignCreatives.filter(c=>c&&(c.imageHash||c.imageUrl||c.videoId||c.primaryText||c.headline)).length;
  return `
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1rem;">
    ${[
      {label:'Campanha',rows:[['Campanhas',S.nc],['Objetivo',OBJECTIVES.find(o=>o.id===S.cc.objective)?.label],['Status',S.cc.status],['Modo creative',mode==='single'?'📌 Único':mode==='per_adset'?'📦 Por conjunto':mode==='per_campaign_adset'?'🎯 Matriz':'🎨 Por campanha']]},
      {label:'Conjunto',rows:[['Por campanha',S.ns],['Total',(S.nc*S.ns).toLocaleString()],['Prefixo',esc(S.adsetPrefix)],['Países',esc(S.ds.countries)]]},
      {label:'Anúncio',rows:[['Por conjunto',S.na],['Total',(S.nc*S.ns*S.na).toLocaleString()],['Mídia',da.mediaType==='video'?'🎬 Vídeo':'🖼 Imagem'],['Página',S.pageMode==='per_campaign'&&S.nc>1?'📄 Por campanha':esc(da.pageName||da.pageId||'—')]]},
    ].map(sec=>`
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:.75rem;padding:1rem;box-shadow:0 1px 3px rgba(0,0,0,.05);">
      <p style="font-size:.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin:0 0 .75rem;">${sec.label}</p>
      ${sec.rows.map(([k,v])=>`
      <div style="display:flex;justify-content:space-between;font-size:.8rem;padding:.375rem 0;border-bottom:1px solid #F8FAFC;">
        <span style="color:var(--text-muted);">${k}</span>
        <span style="font-weight:600;color:var(--text-primary);">${v||'—'}</span>
      </div>`).join('')}
    </div>`).join('')}
  </div>
  ${card('Campanhas',`${S.nc} campanhas · modo ${mode==='single'?'único':customCount+' custom, '+(S.nc-customCount)+' padrão'}`,`
  <div style="display:flex;flex-direction:column;gap:.375rem;max-height:200px;overflow-y:auto;">
    ${S.campNames.map((n,i)=>{
      const cr=S.campaignCreatives[i];
      const hasCustMedia=cr&&(cr.imageHash||cr.imageUrl||cr.videoId);
      return `<div style="display:flex;align-items:center;gap:.75rem;font-size:.8rem;">
        <span style="color:var(--text-muted);font-family:monospace;width:24px;">#${String(i+1).padStart(2,'0')}</span>
        <span style="font-weight:500;color:var(--text-secondary);flex:1;">${esc(n)}</span>
        ${mode==='per_campaign'?(hasCustMedia?'<span style="font-size:.65rem;background:#DCFCE7;color:#16A34A;padding:1px 6px;border-radius:99px;font-weight:700;">🎨 custom</span>':'<span style="font-size:.65rem;color:var(--text-muted);">↳ padrão</span>'):''}
        ${S.pageMode==='per_campaign'&&S.nc>1?`<span style="font-size:.6rem;color:${S.campaignPages[i]?'#1a2440':'#94A3B8'};white-space:nowrap;">📄 ${esc(S.campaignPages[i]?S.pages.find(p=>p.id===S.campaignPages[i])?.name||S.campaignPages[i]:'padrão')}</span>`:''}
        <span style="color:var(--text-muted);">${S.ns} conj. × ${S.na} anúnc.</span>
      </div>`;
    }).join('')}
  </div>`)}`;
}

function renderS5() {
  const pct=S.pubTotal>0?Math.round(S.pubDone/S.pubTotal*100):0;
  const C={info:'#94A3B8',success:'#22C55E',error:'#EF4444',loading:'#F59E0B'};
  return card('Publicação em Massa',`${esc(S.selectedAccount?.name||'')} · Batch API`,`
  <div>
    <div style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--text-secondary);margin-bottom:.5rem;">
      <span>${S.pubDone} / ${S.pubTotal} lotes HTTP</span><span style="font-weight:700;">${pct}%</span>
    </div>
    <div style="width:100%;height:10px;background:var(--bg-primary);border-radius:9999px;overflow:hidden;">
      <div id="pub-bar" style="height:100%;border-radius:9999px;background:${S.pubFinished?'#22C55E':S.pubRunning?'#1a2440':'var(--border)'};width:${pct}%;transition:width .5s;"></div>
    </div>
  </div>
  ${S.pubFinished?`<div style="background:#F0FDF4;border:1px solid #BBF7D0;border-radius:.75rem;padding:1rem;display:flex;align-items:center;gap:.75rem;">
    <span style="font-size:1.5rem;">🎉</span>
    <div style="flex:1;"><p style="font-weight:700;color:#166534;margin:0;">Publicação concluída!</p>${S.pubErrors.length?`<p style="font-size:.8rem;color:#92400E;margin:.25rem 0 0;">${S.pubErrors.length} erro(s)</p>`:''}</div>
    <a href="https://www.facebook.com/adsmanager/manage/campaigns?act=${S.selectedAccount?.id?.replace('act_','')}" target="_blank" style="background:#16A34A;color:white;padding:.5rem 1rem;border-radius:.625rem;font-size:.8rem;font-weight:700;text-decoration:none;">Ver no Meta →</a>
  </div>`:''}
  ${!S.pubRunning&&!S.pubFinished?`<button onclick="showConfirmPub()" style="width:100%;background:var(--accent);color:white;border:none;border-radius:.75rem;padding:1rem;font-size:.9rem;font-weight:700;cursor:pointer;" onmouseover="this.style.background='#0f1729'" onmouseout="this.style.background='#1a2440'">⚡ Publicar ${S.nc} Campanhas (${(S.nc*S.ns).toLocaleString()} conjuntos)</button>`:''}
  ${S.pubRunning?`<div style="display:flex;gap:.75rem;">
    <div style="flex:1;background:rgba(215,250,0,.1);border-radius:.75rem;padding:1rem;display:flex;align-items:center;justify-content:center;gap:.75rem;color:var(--accent);font-weight:700;">
      <div style="width:20px;height:20px;border:2px solid #A5B4FC;border-top-color:var(--accent);border-radius:50%;" class="spin"></div>Publicando...
    </div>
    <button onclick="stopPub=true" style="padding:1rem 1.25rem;background:#FEF2F2;border:1px solid #FECACA;border-radius:.75rem;color:#EF4444;font-weight:700;cursor:pointer;font-size:.875rem;">⏹</button>
  </div>`:''}
  ${S.pubFinished?`<button onclick="S.pubLog=[];S.pubRunning=false;S.pubFinished=false;S.pubDone=0;S.pubTotal=0;S.pubErrors=[];S.bulkStep=0;R()" style="width:100%;border:1.5px solid var(--border);background:var(--bg-card);border-radius:.75rem;padding:.75rem;color:var(--text-secondary);font-weight:600;cursor:pointer;font-size:.875rem;" onmouseover="this.style.background='#F8FAFC'" onmouseout="this.style.background='white'">+ Novo lote</button>`:''}
  <div id="pub-log" style="background:#020617;border-radius:.75rem;padding:.875rem;font-family:monospace;font-size:.75rem;max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:.125rem;">
    ${S.pubLog.length?S.pubLog.slice(-80).map(l=>`<span style="color:${C[l.t]||'#94A3B8'};">${esc(l.m)}</span>`).join(''):'<span style="color:var(--text-secondary);">Aguardando...</span>'}
  </div>
  ${S.pubErrors.length?`<div style="background:#FEF2F2;border:1px solid #FECACA;border-radius:.75rem;padding:1rem;">
    <p style="font-size:.75rem;font-weight:700;color:#EF4444;margin:0 0 .5rem;">Erros:</p>
    ${S.pubErrors.map(e=>`<p style="font-size:.75rem;color:#EF4444;margin:.125rem 0;">${esc(e.campName)}: ${esc(e.error)}</p>`).join('')}
  </div>`:''}
  `);
}

// ── Campaigns ──────────────────────────────────────────────────────────────
function renderCampaigns() {
  if(S.campaignEditor.expandedId)return renderCampaignDetail();
  return `<div style="display:flex;flex-direction:column;height:100%;">
  <div style="padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);background:var(--bg-primary);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
    <div><h2 style="font-weight:700;font-size:1.125rem;margin:0;color:var(--text-primary);">Campanhas</h2>
    <p style="font-size:.75rem;color:var(--text-muted);margin:.125rem 0 0;">${S.campaigns.length} campanhas · ${esc(S.selectedAccount?.name||'')}</p></div>
    <button onclick="loadCampaigns()" style="padding:.5rem 1rem;border:1.5px solid var(--border);border-radius:.625rem;background:var(--bg-card);color:var(--accent);font-size:.8rem;font-weight:600;cursor:pointer;">↻ Atualizar</button>
  </div>
  ${S.campaigns.length?`<div style="padding:.75rem 1.25rem;border-bottom:1px solid var(--border);display:flex;gap:.75rem;align-items:center;background:var(--bg-primary);flex-shrink:0;">
    <input id="camp-search" type="text" placeholder="Buscar por nome..." value="${esc(S.campaignSearch)}" oninput="S.campaignSearch=this.value;R()"
      style="flex:1;border:1.5px solid var(--border);border-radius:.5rem;padding:.5rem .75rem;font-size:.8rem;outline:none;background:var(--bg-card);"
      onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'"/>
    <div style="display:flex;gap:.25rem;">
      ${[['all','Todos'],['ACTIVE','Ativas'],['PAUSED','Pausadas'],['ARCHIVED','Arquivadas']].map(([v,l])=>`
      <button onclick="S.campaignFilter='${v}';R()" style="padding:.375rem .75rem;border-radius:.5rem;border:1.5px solid ${S.campaignFilter===v?'#1a2440':'var(--border)'};background:${S.campaignFilter===v?'#EEF2FF':'white'};color:${S.campaignFilter===v?'#1a2440':'#64748B'};font-size:.75rem;font-weight:600;cursor:pointer;">${l}</button>`).join('')}
    </div>
  </div>`:''}`
  +`<div style="flex:1;overflow-y:auto;">
    ${S.campaignsLoading?`<div style="display:flex;align-items:center;justify-content:center;height:160px;gap:.75rem;color:var(--text-muted);"><div style="width:20px;height:20px;border:2px solid #A5B4FC;border-top-color:var(--accent);border-radius:50%;" class="spin"></div>Carregando...</div>`:
    S.campaigns.length===0?`<div style="display:flex;align-items:center;justify-content:center;height:160px;color:var(--text-muted);font-size:.875rem;">Nenhuma campanha.</div>`:
    (()=>{const filtered=S.campaigns.filter(c=>{
      if(S.campaignFilter!=='all'&&c.status!==S.campaignFilter)return false;
      if(S.campaignSearch&&!c.name.toLowerCase().includes(S.campaignSearch.toLowerCase()))return false;
      return true;
    }); return filtered.length===0?`<div style="display:flex;align-items:center;justify-content:center;height:160px;color:var(--text-muted);font-size:.875rem;">Nenhuma campanha encontrada.</div>`:`
    <table style="width:100%;border-collapse:collapse;">
      <thead><tr style="background:var(--bg-secondary);border-bottom:1px solid var(--border);position:sticky;top:0;">
        <th style="padding:.75rem 1.25rem;text-align:left;font-size:.7rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;">Nome</th>
        <th style="padding:.75rem 1rem;text-align:left;font-size:.7rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;">Objetivo</th>
        <th style="padding:.75rem 1rem;text-align:center;font-size:.7rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;">On/Off</th>
        <th style="padding:.75rem 1rem;text-align:left;font-size:.7rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;">Status</th>
        <th style="padding:.75rem 1rem;text-align:left;font-size:.7rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;">Orçamento</th>
        <th style="padding:.75rem 1rem;text-align:left;font-size:.7rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;">Criada</th>
      </tr></thead>
      <tbody>
        ${filtered.map(c=>`
        <tr style="border-bottom:1px solid var(--border);" onmouseover="this.style.background='#FAFAFA'" onmouseout="this.style.background='white'">
          <td onclick="openCampaignEditor('${c.id}')" style="padding:.875rem 1.25rem;cursor:pointer;"><p style="font-weight:600;color:var(--accent);margin:0;font-size:.875rem;text-decoration:underline;">${esc(c.name)}</p><p style="font-size:.7rem;color:var(--text-muted);margin:.125rem 0 0;font-family:monospace;">${esc(c.id)}</p></td>
          <td style="padding:.875rem 1rem;font-size:.8rem;color:var(--text-secondary);">${c.objective?.replace('OUTCOME_','')||'—'}</td>
          <td style="padding:.875rem 1rem;text-align:center;">
            ${S.campaignToggling[c.id]?
              `<div style="width:20px;height:20px;border:2px solid #A5B4FC;border-top-color:var(--accent);border-radius:50%;margin:0 auto;" class="spin"></div>`:
              `<div onclick="toggleCampaignStatus('${c.id}','${c.status}')" style="width:40px;height:22px;border-radius:99px;background:${c.status==='ACTIVE'?'#1a2440':'var(--border)'};cursor:pointer;position:relative;margin:0 auto;">
                <div style="position:absolute;top:2px;width:18px;height:18px;background:var(--bg-card);border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.2);left:${c.status==='ACTIVE'?'20px':'2px'};transition:left .15s;"></div>
              </div>`}
          </td>
          <td style="padding:.875rem 1rem;">${statusBadge(c.status)}</td>
          <td style="padding:.875rem 1rem;font-size:.875rem;color:var(--text-secondary);">${c.daily_budget?`$${(c.daily_budget/100).toFixed(2)}/d`:c.lifetime_budget?`$${(c.lifetime_budget/100).toFixed(2)}`:'CBO'}</td>

      </tbody>

  </div></div>`;
}

// ── Google Drive Integration ──────────────────────────────────────────────
let _gisLoaded=false, _pickerLoaded=false, _gAccessToken=null;

function loadGoogleApis(){
  return new Promise((res,rej)=>{
    const gs=JSON.parse(localStorage.getItem('globalSettings')||'{}');
    if(!gs.googleApiKey||!gs.googleClientId){rej(new Error('Configure Google API Key e Client ID nas Settings.'));return;}
    let done=0;const check=()=>{done++;if(done>=2)res();};
    // Load GIS (Google Identity Services)
    if(_gisLoaded){check();}else{
      if(document.getElementById('gis-sdk')){_gisLoaded=true;check();}else{
        const s=document.createElement('script');s.id='gis-sdk';s.src='https://accounts.google.com/gsi/client';
        s.onload=()=>{_gisLoaded=true;check();};s.onerror=()=>rej(new Error('Falha ao carregar Google Identity Services'));
        document.head.appendChild(s);
      }
    }
    // Load Google Picker API via gapi
    if(_pickerLoaded){check();}else{
      if(window.google?.picker){_pickerLoaded=true;check();}else{
        const loadPicker=()=>{window.gapi.load('picker',()=>{_pickerLoaded=true;check();});};
        if(window.gapi){loadPicker();}else{
          const s=document.createElement('script');s.id='gapi-sdk';s.src='https://apis.google.com/js/api.js';
          s.onload=loadPicker;s.onerror=()=>rej(new Error('Falha ao carregar Google API'));
          document.head.appendChild(s);
        }
      }
    }
  });
}

function getGoogleToken(){
  return new Promise((res,rej)=>{
    if(_gAccessToken){res(_gAccessToken);return;}
    const gs=JSON.parse(localStorage.getItem('globalSettings')||'{}');
    const client=google.accounts.oauth2.initTokenClient({
      client_id:gs.googleClientId,
      scope:'https://www.googleapis.com/auth/drive.readonly',
      callback:(resp)=>{
        if(resp.error){rej(new Error(resp.error));return;}
        _gAccessToken=resp.access_token;
        res(resp.access_token);
      },
    });
    client.requestAccessToken();
  });
}

async function openGoogleDrivePicker(){
  const gs=JSON.parse(localStorage.getItem('globalSettings')||'{}');
  if(!gs.googleApiKey||!gs.googleClientId){toast('Configure Google API Key e Client ID nas Settings → Google Drive.','warning');return;}
  toast('Carregando Google Drive...','info',2000);
  try{
    await loadGoogleApis();
    const token=await getGoogleToken();
    const view=new google.picker.DocsView()
      .setIncludeFolders(true)
      .setMimeTypes('image/jpeg,image/png,image/webp,video/mp4,video/quicktime,video/avi,video/mov')
      .setSelectFolderEnabled(false);
    const picker=new google.picker.PickerBuilder()
      .addView(view)
      .addView(new google.picker.DocsView().setMimeTypes('video/mp4,video/quicktime,video/mov').setLabel('Vídeos'))
      .setOAuthToken(token)
      .setDeveloperKey(gs.googleApiKey)
      .setCallback(googlePickerCallback)
      .setTitle('Selecionar mídia do Google Drive')
      .setMaxItems(1)
      .build();
    picker.setVisible(true);
  }catch(e){toast('Erro Google Drive: '+e.message,'error');}
}

async function googlePickerCallback(data){
  if(data.action!==google.picker.Action.PICKED)return;
  const file=data.docs[0];
  if(!file)return;
  const isVideo=file.mimeType?.startsWith('video/');
  const fileName=file.name||'drive_file';
  const fileId=file.id;

  toast(`Baixando "${fileName}" do Drive...`,'info',4000);
  try{
    // Download file content from Google Drive
    const resp=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{
      headers:{'Authorization':`Bearer ${_gAccessToken}`}
    });
    if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
    const blob=await resp.blob();
    const realFile=new File([blob],fileName,{type:file.mimeType||blob.type});

    toast(`Enviando "${fileName}" para Meta...`,'info',4000);
    // Upload to Meta via existing upload mechanism
    if(!S.selectedAccount){toast('Selecione uma conta Meta primeiro.','warning');return;}
    await uploadDriveFileToMeta(isVideo?'video':'image',realFile);
    toast(`"${fileName}" enviado com sucesso!`,'success');
  }catch(e){toast('Erro ao processar arquivo: '+e.message,'error');}
}

async function uploadDriveFileToMeta(type,file){
  const fd=new FormData();
  fd.append('access_token',S.token);
  if(type==='video'){fd.append('title',file.name.replace(/\.[^/.]+$/,''));fd.append('source',file);}
  else fd.append('filename',file);
  return new Promise((res,rej)=>{
    const xhr=new XMLHttpRequest();
    xhr.open('POST',`https://graph.facebook.com/${S.apiVersion}/${S.selectedAccount.id}/${type==='video'?'advideos':'adimages'}`);
    const prog=document.getElementById('gdrive-prog');
    xhr.upload.onprogress=e=>{
      if(prog&&e.lengthComputable){prog.style.display='block';prog.innerHTML=`<div style="background:rgba(215,250,0,.1);border-radius:.5rem;padding:.625rem;font-size:.75rem;color:var(--accent);display:flex;align-items:center;gap:.5rem;"><div style="width:14px;height:14px;border:2px solid #A5B4FC;border-top-color:var(--accent);border-radius:50%;" class="spin"></div>Upload: ${Math.round(e.loaded/e.total*100)}%</div>`;}
    };
    xhr.onload=()=>{
      if(prog)prog.style.display='none';
      const d=JSON.parse(xhr.responseText);
      if(d.error){rej(new Error(d.error.message));return;}
      // Refresh media library
      mediaTab=type==='video'?'videos':'images';
      loadMediaData();
      res(d);
    };
    xhr.onerror=()=>{if(prog)prog.style.display='none';rej(new Error('Upload falhou'));};
    xhr.send(fd);
  });
}

function getMediaFolders(items, nameKey='title') {
  // Group items into virtual folders by prefix (before first " - ", " — ", " _ " or standalone prefix)
  const folders={}, loose=[];
  items.forEach(item=>{
    const name=item[nameKey]||item.name||'';
    // Try to extract folder prefix: "FolderName - file" or "FolderName_file" or "FolderName/file"
    const match=name.match(/^([^—\-\/]+?)[\s]*[—\-\/][\s]*/);
    if(match&&match[1].trim().length>=2&&match[1].trim().length<=40){
      const folder=match[1].trim();
      if(!folders[folder])folders[folder]=[];
      folders[folder].push(item);
    } else {
      loose.push(item);
    }
  });
  // Only create folders with 2+ items, otherwise treat as loose
  const result={};
  Object.entries(folders).forEach(([k,v])=>{
    if(v.length>=2)result[k]=v;
    else loose.push(...v);
  });
  if(loose.length)result['_outros']=loose;
  return result;
}
